<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art-Sync | 사장님 화면</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-header">
    <h1>🎨 화방 관리</h1>
    <div class="right">
        <button class="bell" onclick="toggleNotify()">🔔<span id="bellBadge" class="badge" style="display:none;">0</span></button>
        <button class="btn-small btn-sub" onclick="logout()">로그아웃</button>
    </div>
</div>

<div class="container">
    <p id="hello" class="greeting"></p>

    <!-- 알림 패널 -->
    <div id="notifyPanel" class="card notify-panel">
        <div class="card-header">
            <span class="card-title">🔔 알림</span>
        </div>
        <div id="notifyList"></div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- 📅 월별 다이어리 -->
    <div class="card">
        <div class="collapsible-header" onclick="toggleSection('diary')">
            <span class="card-title">📅 월별 다이어리</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div id="diaryBody" class="collapsible-body open">
            <div class="cal-nav">
                <button class="btn btn-sub btn-small" onclick="moveDiaryMonth(-1)">‹ 이전</button>
                <span id="diaryMonthLabel" class="cal-month-label"></span>
                <button class="btn btn-sub btn-small" onclick="moveDiaryMonth(1)">다음 ›</button>
            </div>
            <div id="calGrid"></div>
            <!-- 날짜 클릭 상세 패널 -->
            <div id="dayDetailPanel" class="day-detail-panel" style="display:none;">
                <div class="day-detail-header">
                    <span id="dayDetailTitle" class="day-detail-title-text"></span>
                    <button class="btn-close" onclick="closeDayDetail()">✕</button>
                </div>
                <div id="dayDetailContent" class="day-detail-content"></div>
            </div>
        </div>
    </div>

    <!-- ① 예약 현황 대시보드 (가장 먼저) -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">📋 예약 현황</span>
        </div>
        <div class="date-row">
            <input type="date" id="dashDate">
            <button class="btn btn-sub btn-small" onclick="loadDashboard()">조회</button>
        </div>
        <div id="dashboardSlots"></div>
    </div>

    <!-- ② 처리할 예약 요청 -->
    <div class="card">
        <div class="card-header">
            <span class="card-title" id="pendingTitle">📬 처리할 예약 요청</span>
            <button class="btn btn-green btn-small" id="confirmAllBtn" style="display:none;" onclick="confirmAllReservations()">✅ 전체 수락</button>
        </div>
        <div id="pendingList"></div>
    </div>

    <!-- ③ 시간대 만들기 (접기/펼치기) -->
    <div class="card">
        <div class="collapsible-header" onclick="toggleSection('createSlot')">
            <span class="card-title">➕ 시간대 만들기</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div id="createSlotBody" class="collapsible-body">
            <!-- 날짜 모드 탭 -->
            <div class="date-mode-tabs">
                <button class="tab-btn active" id="tabSingle" onclick="setDateMode('single')">📅 단일 날짜</button>
                <button class="tab-btn" id="tabRepeat" onclick="setDateMode('repeat')">🔁 요일 반복</button>
            </div>

            <!-- 단일 날짜 모드 -->
            <div id="modeSingle">
                <label for="cDate">날짜</label>
                <input type="date" id="cDate" onchange="onAdminDateChange()">
                <div id="adminDateWarning" class="date-warning" style="display:none;"></div>
            </div>

            <!-- 요일 반복 모드 -->
            <div id="modeRepeat" style="display:none;">
                <div class="repeat-range">
                    <div>
                        <label for="rFrom">시작일</label>
                        <input type="date" id="rFrom" onchange="updateRepeatPreview()">
                    </div>
                    <div>
                        <label for="rTo">종료일</label>
                        <input type="date" id="rTo" onchange="updateRepeatPreview()">
                    </div>
                </div>
                <span class="weekday-label">반복 요일</span>
                <div class="weekday-btns">
                    <button class="wd-btn" data-dow="0" onclick="toggleDow(0)">일</button>
                    <button class="wd-btn" data-dow="1" onclick="toggleDow(1)">월</button>
                    <button class="wd-btn" data-dow="2" onclick="toggleDow(2)">화</button>
                    <button class="wd-btn" data-dow="3" onclick="toggleDow(3)">수</button>
                    <button class="wd-btn" data-dow="4" onclick="toggleDow(4)">목</button>
                    <button class="wd-btn" data-dow="5" onclick="toggleDow(5)">금</button>
                    <button class="wd-btn" data-dow="6" onclick="toggleDow(6)">토</button>
                </div>
                <div id="repeatPreview" class="repeat-preview">
                    <span class="preview-empty">날짜 범위와 요일을 선택하면 대상 날짜가 표시됩니다.</span>
                </div>
            </div>

            <!-- 슬롯 설정 -->
            <div class="slot-grid-settings">
                <div>
                    <label for="cMinutes">한 타임 길이 (분)</label>
                    <input type="number" id="cMinutes" value="120" min="10" step="10" onchange="renderTimeGrid()">
                </div>
                <div>
                    <label for="cCapacity">최대 인원</label>
                    <input type="number" id="cCapacity" value="4" min="1">
                </div>
            </div>

            <!-- 시간 그리드 -->
            <p class="time-grid-hint">열고 싶은 시간대를 클릭해서 선택하세요.</p>
            <div class="time-section-label">오전</div>
            <div id="timeGridAm" class="time-grid"></div>
            <div class="time-section-label">오후</div>
            <div id="timeGridPm" class="time-grid"></div>

            <div id="selectedCount" class="selected-count" style="display:none;"></div>
            <label class="auto-activate-label" id="autoActivateWrap" style="display:none;">
                <input type="checkbox" id="autoActivate" checked>
                만들면서 바로 공개 <span style="font-weight:normal;color:#888;">(회원에게 즉시 노출)</span>
            </label>
            <button class="btn" id="createBtn" onclick="createSlotsFromGrid()" style="display:none;">선택한 시간대 만들기</button>
            <p id="activateHint" style="margin-top:8px; color:#aaa; font-size:13px;">만든 뒤 "시간대 관리"에서 공개 버튼을 눌러야 회원에게 보여요.</p>
        </div>
    </div>

    <!-- ④ 시간대 관리 (접기/펼치기) -->
    <div class="card">
        <div class="collapsible-header" onclick="toggleSection('manageSlot')">
            <span class="card-title">⚙️ 시간대 관리 / 공개</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div id="manageSlotBody" class="collapsible-body">
            <div class="date-row" style="margin-bottom:0;">
                <input type="date" id="mDate">
                <button class="btn btn-sub btn-small" onclick="loadAdminSlots()">이 날짜 보기</button>
            </div>
            <div id="adminSlotList" style="margin-top:14px;"></div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    let currentUser = null;

    (async function init() {
        currentUser = await requireLogin('ADMIN');
        if (!currentUser) return;
        document.getElementById('hello').innerHTML = '<strong>' + currentUser.name + '</strong> 님, 안녕하세요. 오늘도 좋은 하루 되세요!';

        const today = todayIso();
        document.getElementById('dashDate').value = today;
        document.getElementById('cDate').value = today;
        document.getElementById('mDate').value = today;

        renderTimeGrid();  // 시간 그리드 초기 렌더링
        loadDiary();
        loadDashboard();
        loadPending();
        loadNotifications();
    })();


    /* ══════════════════════════════════════════
       📅 월별 다이어리
    ══════════════════════════════════════════ */
    /** Date 객체 → 로컬 시간 기준 YYYY-MM-DD (toISOString은 UTC라 한국에서 하루 밀림) */
    function localDateIso(d) {
        return d.getFullYear() + '-'
            + String(d.getMonth() + 1).padStart(2, '0') + '-'
            + String(d.getDate()).padStart(2, '0');
    }

    let diaryYear  = new Date().getFullYear();
    let diaryMonth = new Date().getMonth() + 1;
    let diaryDataMap = {};   // { "YYYY-MM-DD": DaySummaryResponse }

    async function loadDiary() {
        document.getElementById('diaryMonthLabel').textContent =
            diaryYear + '년 ' + diaryMonth + '월';
        try {
            const list = await api('GET',
                '/api/admin/reservations/monthly-summary?year=' + diaryYear + '&month=' + diaryMonth);
            diaryDataMap = {};
            list.forEach(d => { diaryDataMap[d.date] = d; });
        } catch (e) {
            diaryDataMap = {};
        }
        renderCalendar();
    }

    function moveDiaryMonth(delta) {
        diaryMonth += delta;
        if (diaryMonth > 12) { diaryMonth = 1; diaryYear++; }
        if (diaryMonth < 1)  { diaryMonth = 12; diaryYear--; }
        closeDayDetail();
        loadDiary();
    }

    function renderCalendar() {
        const firstDow   = new Date(diaryYear, diaryMonth - 1, 1).getDay();
        const daysInMonth = new Date(diaryYear, diaryMonth, 0).getDate();
        const todayStr   = todayIso();
        const DOW_LABELS = ['일','월','화','수','목','금','토'];

        let html = '<div class="cal-header-row">'
            + DOW_LABELS.map(d => '<div class="cal-hcell">' + d + '</div>').join('')
            + '</div><div class="cal-body">';

        // 첫 주 빈 칸
        for (let i = 0; i < firstDow; i++) html += '<div class="cal-cell empty"></div>';

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = diaryYear + '-' + pad(diaryMonth) + '-' + pad(d);
            const summary = diaryDataMap[dateStr];
            const isToday = dateStr === todayStr;

            let cls = 'cal-cell';
            if (isToday) cls += ' cal-today';

            let inner = '<div class="cal-day-num">' + d + '</div>';

            if (summary) {
                if (summary.reservations.length > 0) {
                    const hasPending = summary.reservations.some(r => r.status === 'REQUESTED');
                    cls += hasPending ? ' cal-has-pending' : ' cal-has-res';

                    // 이름별 예약 시간 수집 (툴팁용)
                    const nameMap = {};
                    summary.reservations.forEach(r => {
                        const nm = r.memberName || ('회원#' + r.memberId);
                        if (!nameMap[nm]) nameMap[nm] = [];
                        nameMap[nm].push(formatTime(r.startTime));
                    });
                    const names = Object.keys(nameMap);
                    names.slice(0, 3).forEach(nm => {
                        const tooltip = nm + ': ' + nameMap[nm].join(', ');
                        inner += '<div class="cal-name" data-tooltip="' + tooltip + '">' + nm + '</div>';
                    });
                    if (names.length > 3)
                        inner += '<div class="cal-more">+' + (names.length - 3) + '명 더</div>';
                } else if (summary.slotCount > 0) {
                    cls += ' cal-has-slots';
                    inner += '<div class="cal-slot-count">' + summary.slotCount + '타임</div>';
                }
            }

            html += '<div class="' + cls + '" onclick="openDayDetail(\'' + dateStr + '\')">' + inner + '</div>';
        }

        // 마지막 주 빈 칸
        const filled = firstDow + daysInMonth;
        const rem = filled % 7 === 0 ? 0 : 7 - (filled % 7);
        for (let i = 0; i < rem; i++) html += '<div class="cal-cell empty"></div>';
        html += '</div>';

        document.getElementById('calGrid').innerHTML = html;
    }

    function openDayDetail(dateStr) {
        const panel = document.getElementById('dayDetailPanel');
        const title = document.getElementById('dayDetailTitle');
        const body  = document.getElementById('dayDetailContent');

        // 날짜 표시
        const [y, m, d] = dateStr.split('-').map(Number);
        const DOW_KO = ['일','월','화','수','목','금','토'];
        const dow = new Date(y, m - 1, d).getDay();
        title.textContent = y + '년 ' + m + '월 ' + d + '일 (' + DOW_KO[dow] + ')';

        const summary = diaryDataMap[dateStr];
        if (!summary) {
            body.innerHTML = '<div class="empty">이 날짜에 만든 시간대가 없어요.</div>';
        } else if (summary.reservations.length === 0) {
            body.innerHTML = '<div class="empty">슬롯은 ' + summary.slotCount + '개 있지만 예약이 없어요.</div>';
        } else {
            // 슬롯(시간)별로 예약 그룹화
            const slotMap = {};
            summary.reservations.forEach(r => {
                const key = formatTime(r.startTime) + '~' + formatTime(r.endTime);
                if (!slotMap[key]) slotMap[key] = [];
                slotMap[key].push(r);
            });
            let html = '';
            Object.entries(slotMap).sort((a,b) => a[0].localeCompare(b[0])).forEach(([time, rs]) => {
                html += '<div style="margin-bottom:12px;">'
                    + '<div style="font-weight:bold;color:var(--brown-dark);font-size:15px;margin-bottom:6px;">'
                    + '🕐 ' + time + '</div>';
                rs.forEach(r => {
                    const nm  = r.memberName || ('회원#' + r.memberId);
                    const sc  = r.status === 'CONFIRMED' ? 'st-confirmed' : 'st-requested';
                    const sl  = r.status === 'CONFIRMED' ? '확정' : '대기중';
                    const icon = r.status === 'CONFIRMED' ? '✅' : '⏳';
                    html += '<div class="member-row">'
                        + icon + ' <span class="member-name">' + nm + '</span>'
                        + '&nbsp;<span class="badge-status ' + sc + '">' + sl + '</span>'
                        + '</div>';
                });
                html += '</div>';
            });
            body.innerHTML = html;
        }
        panel.style.display = 'block';
    }

    function closeDayDetail() {
        document.getElementById('dayDetailPanel').style.display = 'none';
    }

    /* ══════════════════════════════════════════
       🔁 시간대 만들기 — 요일 반복 모드
    ══════════════════════════════════════════ */
    let currentDateMode = 'single';
    let selectedDows = new Set();   // 0=일, 1=월, ... 6=토

    function setDateMode(mode) {
        currentDateMode = mode;
        document.getElementById('modeSingle').style.display = mode === 'single' ? 'block' : 'none';
        document.getElementById('modeRepeat').style.display = mode === 'repeat' ? 'block' : 'none';
        document.getElementById('tabSingle').classList.toggle('active', mode === 'single');
        document.getElementById('tabRepeat').classList.toggle('active', mode === 'repeat');
        // 반복 모드 초기값
        if (mode === 'repeat') {
            const today = todayIso();
            if (!document.getElementById('rFrom').value) document.getElementById('rFrom').value = today;
            if (!document.getElementById('rTo').value) {
                const d = new Date();
                d.setDate(d.getDate() + 27); // 4주 후
                document.getElementById('rTo').value = localDateIso(d);
            }
            updateRepeatPreview();
        }
        selectedTimes.clear();
        renderTimeGrid();
    }

    function toggleDow(dow) {
        if (selectedDows.has(dow)) selectedDows.delete(dow);
        else selectedDows.add(dow);
        document.querySelectorAll('.wd-btn').forEach(btn => {
            const d = Number(btn.dataset.dow);
            btn.classList.toggle('selected', selectedDows.has(d));
        });
        updateRepeatPreview();
    }

    function getRepeatDates() {
        const from = document.getElementById('rFrom').value;
        const to   = document.getElementById('rTo').value;
        if (!from || !to || selectedDows.size === 0) return [];
        const result = [];
        let cur = new Date(from + 'T00:00:00');
        const end = new Date(to + 'T00:00:00');
        while (cur <= end) {
            if (selectedDows.has(cur.getDay())) {
                result.push(localDateIso(cur));  // 로컬 날짜로 변환 (UTC 아님)
            }
            cur.setDate(cur.getDate() + 1);
        }
        return result;
    }

    function updateRepeatPreview() {
        const dates = getRepeatDates();
        const box = document.getElementById('repeatPreview');
        if (dates.length === 0) {
            box.innerHTML = '<span class="preview-empty">날짜 범위와 요일을 선택하면 대상 날짜가 표시됩니다.</span>';
            return;
        }
        const DOW_KO = ['일','월','화','수','목','금','토'];
        const chips = dates.map(ds => {
            const [y, m, d] = ds.split('-').map(Number);
            const dow = new Date(y, m-1, d).getDay();
            return '<span class="repeat-date-chip">' + m + '/' + d + '(' + DOW_KO[dow] + ')</span>';
        }).join('');
        box.innerHTML = '총 <strong>' + dates.length + '일</strong>: ' + chips;
    }

    /* ── 접기/펼치기 ── */
    function toggleSection(name) {
        const body = document.getElementById(name + 'Body');
        const header = body.previousElementSibling;
        const isOpen = body.classList.toggle('open');
        header.classList.toggle('open', isOpen);
    }

    /* ── ① 예약 현황 대시보드 ── */
    async function loadDashboard() {
        const date = document.getElementById('dashDate').value;
        if (!date) return;
        const box = document.getElementById('dashboardSlots');
        box.innerHTML = '<div class="empty">불러오는 중...</div>';
        try {
            const [slots, reservations] = await Promise.all([
                api('GET', '/api/admin/slots?date=' + date),
                api('GET', '/api/admin/reservations/by-date?date=' + date)
            ]);

            if (slots.length === 0) {
                box.innerHTML = '<div class="empty">이 날짜에 만든 시간대가 없어요.</div>';
                return;
            }

            // 슬롯별로 예약 그룹화
            const resMap = {};
            reservations.forEach(r => {
                if (!resMap[r.slotId]) resMap[r.slotId] = [];
                resMap[r.slotId].push(r);
            });

            box.innerHTML = slots.map(slot => renderDashboardSlot(slot, resMap[slot.id] || [])).join('');
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    function renderDashboardSlot(slot, reservations) {
        const statusBadge = '<span class="badge-status ' + slotStatusClass(slot.status) + '">'
            + slotStatusLabel(slot.status) + '</span>';
        const visibleBadge = slot.active
            ? '<span class="badge-status st-confirmed">공개</span>'
            : '<span class="badge-status st-closed">비공개</span>';

        let membersHtml;
        if (reservations.length === 0) {
            membersHtml = '<div class="slot-body empty-body">아직 예약이 없어요.</div>';
        } else {
            const rows = reservations.map(r => {
                const icon = r.status === 'CONFIRMED' ? '✅' : '⏳';
                const statusLabel = r.status === 'CONFIRMED' ? '확정' : '대기중';
                const statusClass = r.status === 'CONFIRMED' ? 'st-confirmed' : 'st-requested';
                return '<div class="member-row">'
                    + icon + ' <span class="member-name">' + (r.memberName || '회원#' + r.memberId) + '</span>'
                    + '&nbsp;<span class="badge-status ' + statusClass + '">' + statusLabel + '</span>'
                    + '</div>';
            }).join('');
            membersHtml = '<div class="slot-body">' + rows + '</div>';
        }

        return '<div class="slot-card">'
            + '<div class="slot-card-header">'
            + '<span class="slot-time">' + formatTime(slot.startTime) + ' ~ ' + formatTime(slot.endTime) + '</span>'
            + '<span class="slot-meta">'
            + '<span class="slot-count">' + slot.confirmedCount + ' / ' + slot.capacity + '명</span>'
            + statusBadge
            + visibleBadge
            + '</span>'
            + '</div>'
            + membersHtml
            + '</div>';
    }

    /* ── ② 처리할 예약 요청 ── */
    let pendingList = [];   // 전체 수락 시 참조용

    async function loadPending() {
        const box = document.getElementById('pendingList');
        const title = document.getElementById('pendingTitle');
        const allBtn = document.getElementById('confirmAllBtn');
        try {
            const list = await api('GET', '/api/admin/reservations');
            pendingList = list;
            if (list.length === 0) {
                title.innerHTML = '📬 처리할 예약 요청';
                box.innerHTML = '<div class="empty">처리할 예약 요청이 없어요.</div>';
                allBtn.style.display = 'none';
                return;
            }
            title.innerHTML = '📬 처리할 예약 요청 <span class="count-badge">' + list.length + '</span>';
            box.innerHTML = list.map(renderPending).join('');
            allBtn.style.display = list.length >= 2 ? 'block' : 'none';  // 2건 이상일 때만 노출
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    async function confirmAllReservations() {
        if (!confirm('대기 중인 예약 ' + pendingList.length + '건을 모두 수락할까요?')) return;
        let ok = 0, fail = 0;
        for (const r of pendingList) {
            try {
                await api('PATCH', '/api/admin/reservations/' + r.id + '/confirm');
                ok++;
            } catch (e) {
                fail++;
            }
        }
        if (ok > 0) showMessage('msg', ok + '건을 수락했어요.' + (fail > 0 ? ' (' + fail + '건 실패)' : ''), 'ok');
        else showMessage('msg', '수락에 실패했어요.', 'error');
        loadPending();
        loadDashboard();
        loadDiary();
    }

    function renderPending(r) {
        const name = r.memberName || '회원#' + r.memberId;
        return '<div class="item">'
            + '<div class="time">' + formatDate(r.slotDate) + '<span class="date-label">'
            + formatTime(r.startTime) + ' ~ ' + formatTime(r.endTime) + '</span></div>'
            + '<div class="meta">'
            + '<span>👤 ' + name + '</span>'
            + (r.memo ? '<span>📝 ' + r.memo + '</span>' : '')
            + '</div>'
            + '<div class="btn-row">'
            + '<button class="btn btn-green" onclick="confirmReservation(' + r.id + ')">✅ 수락</button>'
            + '<button class="btn btn-gray" onclick="rejectReservation(' + r.id + ')">❌ 거절</button>'
            + '</div></div>';
    }

    async function confirmReservation(id) {
        if (!confirm('이 예약을 수락할까요?')) return;
        try {
            await api('PATCH', '/api/admin/reservations/' + id + '/confirm');
            showMessage('msg', '예약을 수락했어요.', 'ok');
            loadPending();
            loadDashboard();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    async function rejectReservation(id) {
        const reason = prompt('거절 사유를 입력하세요 (선택, 비워도 됩니다)');
        if (reason === null) return;
        try {
            await api('PATCH', '/api/admin/reservations/' + id + '/reject', { reason: reason });
            showMessage('msg', '예약을 거절했어요.', 'ok');
            loadPending();
            loadDashboard();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* ── ③ 시간대 만들기 — 그리드 선택 방식 ── */

    let selectedTimes = new Set();  // "HH:MM" 형태

    function onAdminDateChange() {
        const date = document.getElementById('cDate').value;
        const today = todayIso();
        const warn = document.getElementById('adminDateWarning');
        if (date < today) {
            warn.textContent = '⚠️ 지난 날짜입니다. 회원이 예약할 수 없지만 강제로 시간대를 만들 수 있어요.';
            warn.className = 'date-warning danger';
            warn.style.display = 'block';
        } else if (date === today) {
            warn.textContent = '⚠️ 오늘 날짜는 예약 마감 기간이에요. 만들어도 회원이 예약 신청을 할 수 없는 상태로 생성됩니다. 그래도 계속 진행할 수 있어요.';
            warn.className = 'date-warning';
            warn.style.display = 'block';
        } else {
            warn.style.display = 'none';
        }
        // 날짜 변경 시 선택 초기화
        selectedTimes.clear();
        renderTimeGrid();
    }

    function renderTimeGrid() {
        const slotMinutes = Number(document.getElementById('cMinutes').value) || 120;

        // 07:00 ~ 21:30 범위 30분 간격 생성
        const allTimes = [];
        for (let h = 7; h <= 21; h++) {
            for (let m = 0; m < 60; m += 30) {
                const startMin = h * 60 + m;
                const endMin = startMin + slotMinutes;
                if (endMin > 23 * 60) continue; // 23시 초과하는 시작 시간 제외
                allTimes.push({ h, m, startMin });
            }
        }

        const amTimes = allTimes.filter(t => t.h < 12);
        const pmTimes = allTimes.filter(t => t.h >= 12);

        function renderGroup(times) {
            return times.map(({ h, m, startMin }) => {
                const startStr = pad(h) + ':' + pad(m);
                const endMin = startMin + slotMinutes;
                const endH = Math.floor(endMin / 60);
                const endM = endMin % 60;
                const endStr = pad(endH) + ':' + pad(endM);
                const isSel = selectedTimes.has(startStr);
                return '<button class="time-btn ' + (isSel ? 'selected' : '') + '" onclick="toggleTime(\'' + startStr + '\')">'
                    + startStr
                    + '<span class="time-end">~ ' + endStr + '</span>'
                    + '</button>';
            }).join('');
        }

        document.getElementById('timeGridAm').innerHTML = renderGroup(amTimes);
        document.getElementById('timeGridPm').innerHTML = renderGroup(pmTimes);
        updateGridStatus();
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function toggleTime(startStr) {
        if (selectedTimes.has(startStr)) {
            selectedTimes.delete(startStr);
        } else {
            selectedTimes.add(startStr);
        }
        renderTimeGrid();
    }

    function updateGridStatus() {
        const cnt = selectedTimes.size;
        const countEl = document.getElementById('selectedCount');
        const btnEl   = document.getElementById('createBtn');
        const wrapEl  = document.getElementById('autoActivateWrap');
        const hintEl  = document.getElementById('activateHint');
        if (cnt > 0) {
            countEl.textContent = cnt + '개 시간대 선택됨';
            countEl.style.display = 'block';
            btnEl.textContent = '선택한 시간대 ' + cnt + '개 만들기';
            btnEl.style.display = 'block';
            wrapEl.style.display = 'block';
            hintEl.style.display = 'none';
        } else {
            countEl.style.display = 'none';
            btnEl.style.display = 'none';
            wrapEl.style.display = 'none';
            hintEl.style.display = 'block';
        }
    }

    async function createSlotsFromGrid() {
        const slotMinutes = Number(document.getElementById('cMinutes').value);
        const capacity = Number(document.getElementById('cCapacity').value) || 4;
        const autoActivate = document.getElementById('autoActivate').checked;

        if (selectedTimes.size === 0) {
            showMessage('msg', '시간대를 하나 이상 선택해 주세요.', 'error');
            return;
        }

        // 대상 날짜 목록
        let targetDates = [];
        if (currentDateMode === 'single') {
            const date = document.getElementById('cDate').value;
            if (!date) { showMessage('msg', '날짜를 선택해 주세요.', 'error'); return; }
            targetDates = [date];
        } else {
            targetDates = getRepeatDates();
            if (targetDates.length === 0) {
                showMessage('msg', '날짜 범위와 반복 요일을 선택해 주세요.', 'error'); return;
            }
        }

        let created = 0;
        const failed = [];

        for (const date of targetDates) {
            for (const startStr of [...selectedTimes].sort()) {
                const [sh, sm] = startStr.split(':').map(Number);
                const endMin = sh * 60 + sm + slotMinutes;
                const endStr = pad(Math.floor(endMin / 60)) + ':' + pad(endMin % 60);
                try {
                    const res = await api('POST', '/api/admin/slots/single', {
                        date, startTime: startStr + ':00', endTime: endStr + ':00', capacity
                    });
                    // 바로 공개 옵션
                    if (autoActivate && res && res.id) {
                        try { await api('PATCH', '/api/admin/slots/' + res.id + '/activate'); } catch(_) {}
                    }
                    created++;
                } catch (e) {
                    failed.push(date + ' ' + startStr + ' (' + e.message + ')');
                }
            }
        }

        if (created > 0) {
            const msg = currentDateMode === 'single'
                ? created + '개의 시간대를 만들었어요.'
                : targetDates.length + '일 × ' + selectedTimes.size + '타임 = ' + created + '개 시간대를 만들었어요.';
            showMessage('msg', msg + ' "시간대 관리"에서 공개해 주세요.', 'ok');
            selectedTimes.clear();
            renderTimeGrid();
            const lastDate = targetDates[targetDates.length - 1];
            document.getElementById('mDate').value = lastDate;
            if (!document.getElementById('manageSlotBody').classList.contains('open')) {
                toggleSection('manageSlot');
            }
            loadAdminSlots();
            loadDashboard();
            loadDiary();
        }
        if (failed.length > 0) {
            showMessage('msg', '일부 실패 (' + failed.length + '건): ' + failed.slice(0,3).join(', ') + (failed.length > 3 ? ' ...' : ''), 'error');
        }
    }

    /* ── ④ 시간대 관리 ── */
    async function loadAdminSlots() {
        const date = document.getElementById('mDate').value;
        if (!date) return;
        const box = document.getElementById('adminSlotList');
        try {
            // 슬롯 목록과 예약자 목록을 동시에 불러옴
            const [slots, reservations] = await Promise.all([
                api('GET', '/api/admin/slots?date=' + date),
                api('GET', '/api/admin/reservations/by-date?date=' + date)
            ]);
            if (slots.length === 0) {
                box.innerHTML = '<div class="empty">이 날짜에 만든 시간대가 없어요.</div>';
                return;
            }
            // 슬롯 ID별로 예약 그룹화
            const resMap = {};
            reservations.forEach(r => {
                if (!resMap[r.slotId]) resMap[r.slotId] = [];
                resMap[r.slotId].push(r);
            });
            box.innerHTML = slots.map(slot => renderAdminSlot(slot, resMap[slot.id] || [])).join('');
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    function renderAdminSlot(slot, reservations) {
        const toggleBtn = slot.active
            ? '<button class="btn btn-gray btn-small" onclick="deactivateSlot(' + slot.id + ')">숨기기</button>'
            : '<button class="btn btn-green btn-small" onclick="activateSlot(' + slot.id + ')">공개하기</button>';
        const visibleText = slot.active ? '공개됨' : '비공개';
        const visibleClass = slot.active ? 'st-confirmed' : 'st-closed';

        // 예약자 목록
        let memberListHtml = '';
        if (reservations.length > 0) {
            const rows = reservations.map(r => {
                const icon = r.status === 'CONFIRMED' ? '✅' : '⏳';
                const sc   = r.status === 'CONFIRMED' ? 'st-confirmed' : 'st-requested';
                const sl   = r.status === 'CONFIRMED' ? '확정' : '대기중';
                return '<div class="manage-member-row">'
                    + icon + ' <span class="manage-member-name">' + (r.memberName || '회원#' + r.memberId) + '</span>'
                    + '<span class="badge-status ' + sc + '">' + sl + '</span>'
                    + '</div>';
            }).join('');
            memberListHtml = '<div class="manage-member-list">' + rows + '</div>';
        }

        return '<div class="item">'
            + '<div class="manage-slot-top">'
            +   '<div>'
            +     '<div class="time">' + formatTime(slot.startTime) + ' ~ ' + formatTime(slot.endTime) + '</div>'
            +     '<div class="meta">'
            +       '<span class="badge-status ' + visibleClass + '">' + visibleText + '</span>'
            +       '<span>확정 ' + slot.confirmedCount + ' / ' + slot.capacity + '명</span>'
            +       '<span class="badge-status ' + slotStatusClass(slot.status) + '">' + slotStatusLabel(slot.status) + '</span>'
            +     '</div>'
            +   '</div>'
            +   (reservations.length > 0 ? memberListHtml : '<div class="manage-no-reservation">예약자 없음</div>')
            + '</div>'
            + '<div class="btn-row" style="margin-top:10px;">'
            + toggleBtn
            + '<button class="btn btn-danger btn-small" onclick="deleteSlot(' + slot.id + ')">삭제</button>'
            + '</div></div>';
    }

    async function activateSlot(id) {
        try {
            await api('PATCH', '/api/admin/slots/' + id + '/activate');
            loadAdminSlots();
            loadDashboard();
        } catch (e) { showMessage('msg', e.message, 'error'); }
    }

    async function deactivateSlot(id) {
        try {
            await api('PATCH', '/api/admin/slots/' + id + '/deactivate');
            loadAdminSlots();
            loadDashboard();
        } catch (e) { showMessage('msg', e.message, 'error'); }
    }

    async function deleteSlot(id) {
        if (!confirm('이 시간대를 삭제할까요?')) return;
        try {
            await api('DELETE', '/api/admin/slots/' + id);
            showMessage('msg', '시간대를 삭제했어요.', 'ok');
            loadAdminSlots();
            loadDashboard();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* ── 알림 ── */
    function toggleNotify() {
        document.getElementById('notifyPanel').classList.toggle('show');
    }

    async function loadNotifications() {
        try {
            const list = await api('GET', '/api/notifications/me');
            const countData = await api('GET', '/api/notifications/me/unread-count');
            const badge = document.getElementById('bellBadge');
            if (countData.unreadCount > 0) {
                badge.textContent = countData.unreadCount;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
            const box = document.getElementById('notifyList');
            if (list.length === 0) {
                box.innerHTML = '<div class="empty">알림이 없어요.</div>';
                return;
            }
            box.innerHTML = list.map(function (n) {
                return '<div class="notify-item ' + (n.read ? '' : 'unread') + '" '
                    + (n.read ? '' : 'onclick="readNotification(' + n.id + ')"') + '>'
                    + n.message
                    + '<div class="when">' + formatDateTime(n.createdAt) + '</div>'
                    + '</div>';
            }).join('');
        } catch (e) { /* 무시 */ }
    }

    async function readNotification(id) {
        try {
            await api('PATCH', '/api/notifications/' + id + '/read');
            loadNotifications();
        } catch (e) { /* 무시 */ }
    }
</script>
