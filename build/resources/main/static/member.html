<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art-Sync | 예약하기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-header">
    <h1>🎨 화방 예약</h1>
    <div class="right">
        <button class="bell" onclick="toggleNotify()">🔔<span id="bellBadge" class="badge" style="display:none;">0</span></button>
        <button class="btn-small btn-sub" onclick="logout()">로그아웃</button>
    </div>
</div>

<div class="container">
    <p id="hello" class="greeting"></p>

    <!-- 알림 패널 -->
    <div id="notifyPanel" class="card notify-panel">
        <div class="card-header">
            <span class="card-title">🔔 알림</span>
        </div>
        <div id="notifyList"></div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- 📅 내 예약 월별 다이어리 -->
    <div class="card">
        <div class="collapsible-header" onclick="toggleMemberDiary()">
            <span class="card-title">📅 내 예약 달력</span>
            <span id="memberDiaryToggleIcon" class="toggle-icon">▼</span>
        </div>
        <div id="memberDiaryBody" class="collapsible-body open">
            <div class="cal-nav">
                <button class="btn btn-sub btn-small" onclick="moveMemberMonth(-1)">‹ 이전</button>
                <span id="memberMonthLabel" class="cal-month-label"></span>
                <button class="btn btn-sub btn-small" onclick="moveMemberMonth(1)">다음 ›</button>
            </div>
            <div id="memberCalGrid"></div>
            <div id="memberDayDetail" class="day-detail-panel" style="display:none;">
                <div class="day-detail-header">
                    <span id="memberDayTitle" class="day-detail-title-text"></span>
                    <button class="btn-close" onclick="closeMemberDayDetail()">✕</button>
                </div>
                <div id="memberDayContent" class="day-detail-content"></div>
            </div>
        </div>
    </div>

    <!-- ① 내 예약 현황 (가장 먼저) -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">📌 내 예약 현황</span>
            <button class="btn btn-sub btn-small" onclick="loadMyReservations()">새로고침</button>
        </div>
        <div id="myReservations"></div>
    </div>

    <!-- ② 예약하기 -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">📅 예약하기</span>
        </div>
        <div class="date-row">
            <input type="date" id="date" onchange="onDateChange()">
            <button class="btn btn-sub btn-small" onclick="loadSlots()">시간대 보기</button>
        </div>
        <div id="dateWarningMsg" class="date-warning" style="display:none;"></div>
        <div id="slotList"></div>
    </div>
</div>

<script src="app.js"></script>
<script>

    /* ══════════════════════════════════════════
       📅 내 예약 달력
    ══════════════════════════════════════════ */
    let memberDiaryYear  = new Date().getFullYear();
    let memberDiaryMonth = new Date().getMonth() + 1;
    let memberAllRes     = [];  // /api/reservations/me 전체 캐시

    function localDateIsoM(d) {
        return d.getFullYear() + '-'
            + String(d.getMonth() + 1).padStart(2, '0') + '-'
            + String(d.getDate()).padStart(2, '0');
    }

    function toggleMemberDiary() {
        const body = document.getElementById('memberDiaryBody');
        const icon = document.getElementById('memberDiaryToggleIcon');
        const open = body.classList.toggle('open');
        icon.style.transform = open ? '' : 'rotate(-90deg)';
    }

    function moveMemberMonth(delta) {
        memberDiaryMonth += delta;
        if (memberDiaryMonth > 12) { memberDiaryMonth = 1; memberDiaryYear++; }
        if (memberDiaryMonth < 1)  { memberDiaryMonth = 12; memberDiaryYear--; }
        closeMemberDayDetail();
        renderMemberCalendar();
    }

    async function loadMemberDiary() {
        try {
            memberAllRes = await api('GET', '/api/reservations/me');
        } catch (e) {
            memberAllRes = [];
        }
        renderMemberCalendar();
    }

    function renderMemberCalendar() {
        document.getElementById('memberMonthLabel').textContent =
            memberDiaryYear + '년 ' + memberDiaryMonth + '월';

        // 이번 달 예약만 필터 후 날짜별 그룹화
        const prefix = memberDiaryYear + '-' + String(memberDiaryMonth).padStart(2, '0');
        const resMap = {};
        memberAllRes.filter(r => r.slotDate && r.slotDate.startsWith(prefix)).forEach(r => {
            if (!resMap[r.slotDate]) resMap[r.slotDate] = [];
            resMap[r.slotDate].push(r);
        });

        const firstDow    = new Date(memberDiaryYear, memberDiaryMonth - 1, 1).getDay();
        const daysInMonth = new Date(memberDiaryYear, memberDiaryMonth, 0).getDate();
        const todayStr    = localDateIsoM(new Date());
        const DOW_LABELS  = ['일','월','화','수','목','금','토'];

        let html = '<div class="cal-header-row">'
            + DOW_LABELS.map(d => '<div class="cal-hcell">' + d + '</div>').join('')
            + '</div><div class="cal-body">';

        for (let i = 0; i < firstDow; i++) html += '<div class="cal-cell empty"></div>';

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = memberDiaryYear + '-'
                + String(memberDiaryMonth).padStart(2, '0') + '-'
                + String(d).padStart(2, '0');
            const resList = resMap[dateStr] || [];
            const isToday = dateStr === todayStr;

            let cls = 'cal-cell';
            if (isToday) cls += ' cal-today';

            let inner = '<div class="cal-day-num">' + d + '</div>';

            if (resList.length > 0) {
                const hasConfirmed = resList.some(r => r.status === 'CONFIRMED');
                const hasRequested = resList.some(r => r.status === 'REQUESTED');
                cls += hasConfirmed ? ' cal-has-res' : ' cal-has-pending';

                resList.slice(0, 2).forEach(r => {
                    const dot = r.status === 'CONFIRMED' ? '✅' : '⏳';
                    inner += '<div class="cal-name" style="font-size:10px;padding:1px 3px;">'
                        + dot + ' ' + formatTime(r.startTime) + '</div>';
                });
                if (resList.length > 2)
                    inner += '<div class="cal-more">+' + (resList.length - 2) + '건</div>';
            }

            html += '<div class="' + cls + '" onclick="openMemberDayDetail(\'' + dateStr + '\')">'
                + inner + '</div>';
        }

        const filled = firstDow + daysInMonth;
        const rem = filled % 7 === 0 ? 0 : 7 - (filled % 7);
        for (let i = 0; i < rem; i++) html += '<div class="cal-cell empty"></div>';
        html += '</div>';

        document.getElementById('memberCalGrid').innerHTML = html;
    }

    function openMemberDayDetail(dateStr) {
        const panel   = document.getElementById('memberDayDetail');
        const titleEl = document.getElementById('memberDayTitle');
        const bodyEl  = document.getElementById('memberDayContent');

        const [y, m, d] = dateStr.split('-').map(Number);
        const DOW_KO = ['일','월','화','수','목','금','토'];
        const dow = new Date(y, m - 1, d).getDay();
        titleEl.textContent = y + '년 ' + m + '월 ' + d + '일 (' + DOW_KO[dow] + ')';

        const prefix = memberDiaryYear + '-' + String(memberDiaryMonth).padStart(2, '0');
        const resList = memberAllRes.filter(r => r.slotDate === dateStr);

        if (resList.length === 0) {
            bodyEl.innerHTML = '<div class="empty">이 날짜의 예약 내역이 없어요.</div>';
        } else {
            bodyEl.innerHTML = resList.map(r => {
                const sc  = r.status === 'CONFIRMED' ? 'st-confirmed' : r.status === 'REQUESTED' ? 'st-requested' : 'st-cancelled';
                const sl  = reservationStatusLabel(r.status);
                const cancellable = r.status === 'REQUESTED' || r.status === 'CONFIRMED';
                const cancelBtn = cancellable
                    ? '<button class="btn btn-danger btn-small" style="margin-top:6px;" onclick="cancelFromDiary(' + r.id + ')">예약 취소</button>'
                    : '';
                return '<div class="item" style="margin-bottom:8px;">'
                    + '<div class="time">' + formatTime(r.startTime) + ' ~ ' + formatTime(r.endTime) + '</div>'
                    + '<div class="meta"><span class="badge-status ' + sc + '">' + sl + '</span></div>'
                    + cancelBtn
                    + '</div>';
            }).join('');
        }
        panel.style.display = 'block';
    }

    function closeMemberDayDetail() {
        document.getElementById('memberDayDetail').style.display = 'none';
    }

    async function cancelFromDiary(id) {
        if (!confirm('예약을 취소할까요?')) return;
        try {
            await api('DELETE', '/api/reservations/' + id);
            showMessage('msg', '예약을 취소했어요.', 'ok');
            await loadMemberDiary();   // 달력 갱신
            loadMyReservations();      // 목록도 갱신
            loadSlots();
            closeMemberDayDetail();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    let currentUser = null;
    let myReservedSlotIds = new Set();  // 이미 신청/확정된 슬롯 ID 목록

    (async function init() {
        currentUser = await requireLogin('MEMBER');
        if (!currentUser) return;
        document.getElementById('hello').innerHTML = '<strong>' + currentUser.name + '</strong> 님, 안녕하세요!';

        // 기본 날짜 = 내일 (오늘은 마감이라 예약 불가)
        const t = new Date();
        t.setDate(t.getDate() + 1);
        const tomorrow = t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0')
            + '-' + String(t.getDate()).padStart(2, '0');

        const dateInput = document.getElementById('date');
        dateInput.value = tomorrow;
        dateInput.min = tomorrow;  // 오늘 이전 날짜 선택 불가

        loadMemberDiary();
        loadMyReservations();
        loadSlots();
        loadNotifications();
    })();

    function onDateChange() {
        const date = document.getElementById('date').value;
        const today = todayIso();
        const warn = document.getElementById('dateWarningMsg');
        if (date <= today) {
            warn.textContent = '⚠️ 오늘 및 이전 날짜는 예약 마감이에요. 내일 이후 날짜를 선택해 주세요.';
            warn.style.display = 'block';
            document.getElementById('slotList').innerHTML = '';
        } else {
            warn.style.display = 'none';
            loadSlots();
        }
    }

    /* ── ① 내 예약 현황 ── */
    async function loadMyReservations() {
        const box = document.getElementById('myReservations');
        box.innerHTML = '<div class="empty">불러오는 중...</div>';
        try {
            const list = await api('GET', '/api/reservations/me');
            if (list.length === 0) {
                box.innerHTML = '<div class="empty">아직 예약 내역이 없어요.<br>아래에서 예약을 신청해 보세요!</div>';
                return;
            }
            // 취소/거절 제외한 활성 예약을 위로
            const active = list.filter(r => r.status === 'CONFIRMED' || r.status === 'REQUESTED');
            const past   = list.filter(r => r.status !== 'CONFIRMED' && r.status !== 'REQUESTED');

            let html = '';
            if (active.length > 0) {
                active.forEach(r => { html += renderMyReservation(r); });
            }
            if (past.length > 0) {
                if (active.length > 0) {
                    html += '<div style="font-size:13px;color:#aaa;margin:14px 0 8px;border-top:1px solid #eee;padding-top:12px;">지난 예약</div>';
                }
                past.forEach(r => { html += renderMyReservation(r); });
            }
            box.innerHTML = html;
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    function renderMyReservation(r) {
        const statusClass = 'status-' + r.status.toLowerCase();
        const cancellable = (r.status === 'REQUESTED' || r.status === 'CONFIRMED');
        const cancelBtn = cancellable
            ? '<button class="btn btn-danger btn-inline" onclick="cancelReservation(' + r.id + ')">예약 취소</button>'
            : '';

        // 상태 설명 추가
        let statusNote = '';
        if (r.status === 'REQUESTED') statusNote = '<span style="font-size:13px;color:#888;">사장님 확인을 기다리고 있어요</span>';
        if (r.status === 'CONFIRMED') statusNote = '<span style="font-size:13px;color:#1f6b41;">예약이 확정되었어요 ✓</span>';

        return '<div class="my-reservation-card ' + statusClass + '">'
            + '<div class="res-date">' + formatDate(r.slotDate) + '</div>'
            + '<div class="res-time">' + formatTime(r.startTime) + ' ~ ' + formatTime(r.endTime) + '</div>'
            + '<div class="res-footer">'
            + '<div>'
            + '<span class="badge-status ' + reservationStatusClass(r.status) + '">' + reservationStatusLabel(r.status) + '</span>'
            + '&nbsp;' + (statusNote || '') + '</div>'
            + cancelBtn
            + '</div>'
            + '</div>';
    }

    async function cancelReservation(id) {
        if (!confirm('예약을 취소할까요?')) return;
        try {
            await api('DELETE', '/api/reservations/' + id);
            showMessage('msg', '예약을 취소했어요.', 'ok');
            loadMemberDiary();
            loadMyReservations();
            loadSlots();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* ── ② 예약하기 ── */
    async function loadSlots() {
        const date = document.getElementById('date').value;
        if (!date) return;
        const box = document.getElementById('slotList');
        box.innerHTML = '<div class="empty">불러오는 중...</div>';
        try {
            const [slots, myRes] = await Promise.all([
                api('GET', '/api/slots?date=' + date),
                api('GET', '/api/reservations/me')
            ]);
            // 현재 사용자가 이미 신청/확정한 슬롯 ID 추적
            myReservedSlotIds = new Set(
                myRes.filter(r => r.status === 'REQUESTED' || r.status === 'CONFIRMED')
                     .map(r => r.slotId)
            );
            if (slots.length === 0) {
                box.innerHTML = '<div class="empty">이 날짜에 열린 시간대가 없어요.</div>';
                return;
            }
            box.innerHTML = slots.map(renderSlot).join('');
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    function renderSlot(slot) {
        const alreadyReserved = myReservedSlotIds.has(slot.id);
        let button;
        if (alreadyReserved) {
            button = '<button class="btn btn-sub" disabled style="opacity:1;color:#2e8b57;cursor:default;">✅ 예약 신청 완료</button>';
        } else if (slot.status === 'AVAILABLE' && slot.remaining > 0) {
            button = '<button class="btn btn-green" onclick="reserve(' + slot.id + ')">예약 신청하기</button>';
        } else {
            button = '<button class="btn btn-gray" disabled>예약 불가</button>';
        }

        return '<div class="slot-card">'
            + '<div class="slot-card-header">'
            + '<span class="slot-time">' + formatTime(slot.startTime) + ' ~ ' + formatTime(slot.endTime) + '</span>'
            + '<span class="slot-meta">'
            + '<span class="slot-count">남은 자리 ' + slot.remaining + ' / ' + slot.capacity + '명</span>'
            + '<span class="badge-status ' + slotStatusClass(slot.status) + '">' + slotStatusLabel(slot.status) + '</span>'
            + '</span>'
            + '</div>'
            + '<div class="slot-body">' + button + '</div>'
            + '</div>';
    }

    async function reserve(slotId) {
        if (!confirm('이 시간대로 예약을 신청할까요?\n사장님이 확인 후 알려드려요.')) return;
        try {
            await api('POST', '/api/reservations', { slotId: slotId, memo: null });
            showMessage('msg', '예약을 신청했어요! 사장님 확인을 기다려 주세요.', 'ok');
            loadMemberDiary();
            loadSlots();
            loadMyReservations();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* ── 알림 ── */
    function toggleNotify() {
        document.getElementById('notifyPanel').classList.toggle('show');
    }

    async function loadNotifications() {
        try {
            const list = await api('GET', '/api/notifications/me');
            const countData = await api('GET', '/api/notifications/me/unread-count');
            const badge = document.getElementById('bellBadge');
            if (countData.unreadCount > 0) {
                badge.textContent = countData.unreadCount;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
            const box = document.getElementById('notifyList');
            if (list.length === 0) {
                box.innerHTML = '<div class="empty">알림이 없어요.</div>';
                return;
            }
            box.innerHTML = list.map(function (n) {
                return '<div class="notify-item ' + (n.read ? '' : 'unread') + '" '
                    + (n.read ? '' : 'onclick="readNotification(' + n.id + ')"') + '>'
                    + n.message
                    + '<div class="when">' + formatDateTime(n.createdAt) + '</div>'
                    + '</div>';
            }).join('');
        } catch (e) { /* 무시 */ }
    }

    async function readNotification(id) {
        try {
            await api('PATCH', '/api/notifications/' + id + '/read');
            loadNotifications();
        } catch (e) { /* 무시 */ }
    }
</script>
</body>
</html>
