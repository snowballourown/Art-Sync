<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art-Sync | 예약하기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-header">
    <h1>🎨 화방 예약</h1>
    <div class="right">
        <button class="bell" onclick="toggleNotify()">🔔<span id="bellBadge" class="badge" style="display:none;">0</span></button>
        <button class="btn-small btn-sub" onclick="logout()">로그아웃</button>
    </div>
</div>

<div class="container">
    <p id="hello" style="margin-bottom:14px;"></p>

    <!-- 알림 패널 -->
    <div id="notifyPanel" class="card notify-panel">
        <h2>알림</h2>
        <div id="notifyList"></div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- 예약 가능 시간대 -->
    <div class="card">
        <h2>예약 가능한 시간 보기</h2>
        <label for="date">날짜를 고르세요</label>
        <input type="date" id="date">
        <button class="btn" onclick="loadSlots()">이 날짜 시간대 보기</button>
        <div id="slotList" style="margin-top:16px;"></div>
    </div>

    <!-- 내 예약 -->
    <div class="card">
        <h2>내 예약 현황</h2>
        <div id="myReservations"></div>
    </div>
</div>

<script src="app.js"></script>
<script>
    let currentUser = null;

    (async function init() {
        currentUser = await requireLogin('MEMBER');
        if (!currentUser) return;
        document.getElementById('hello').textContent = currentUser.name + ' 님, 안녕하세요.';

        // 기본 날짜 = 내일 (오늘은 마감 규칙상 예약 불가)
        const t = new Date();
        t.setDate(t.getDate() + 1);
        document.getElementById('date').value =
            t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0')
            + '-' + String(t.getDate()).padStart(2, '0');

        loadSlots();
        loadMyReservations();
        loadNotifications();
    })();

    /* ---------- 예약 가능 시간대 ---------- */
    async function loadSlots() {
        const date = document.getElementById('date').value;
        if (!date) return;
        const box = document.getElementById('slotList');
        try {
            const slots = await api('GET', '/api/slots?date=' + date);
            if (slots.length === 0) {
                box.innerHTML = '<div class="empty">이 날짜에 열린 시간대가 없어요.</div>';
                return;
            }
            box.innerHTML = slots.map(renderSlot).join('');
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    function renderSlot(slot) {
        const canReserve = slot.status === 'AVAILABLE' && slot.remaining > 0;
        const button = canReserve
            ? '<button class="btn btn-green" onclick="reserve(' + slot.id + ')">예약하기</button>'
            : '<button class="btn btn-gray" disabled>예약 불가</button>';
        return '<div class="item">'
            + '<div class="time">' + formatTime(slot.startTime) + ' ~ ' + formatTime(slot.endTime) + '</div>'
            + '<div class="meta">남은 자리 ' + slot.remaining + ' / ' + slot.capacity + '명 '
            + '<span class="badge-status ' + slotStatusClass(slot.status) + '">' + slotStatusLabel(slot.status) + '</span></div>'
            + button
            + '</div>';
    }

    async function reserve(slotId) {
        if (!confirm('이 시간대로 예약을 신청할까요?\n사장님이 확인 후 알려드려요.')) return;
        try {
            await api('POST', '/api/reservations', { slotId: slotId, memo: null });
            showMessage('msg', '예약을 신청했어요. 사장님 확인을 기다려 주세요.', 'ok');
            loadSlots();
            loadMyReservations();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* ---------- 내 예약 ---------- */
    async function loadMyReservations() {
        const box = document.getElementById('myReservations');
        try {
            const list = await api('GET', '/api/reservations/me');
            if (list.length === 0) {
                box.innerHTML = '<div class="empty">아직 예약 내역이 없어요.</div>';
                return;
            }
            box.innerHTML = list.map(renderMyReservation).join('');
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    function renderMyReservation(r) {
        const cancellable = (r.status === 'REQUESTED' || r.status === 'CONFIRMED');
        const cancelBtn = cancellable
            ? '<button class="btn btn-danger" onclick="cancelReservation(' + r.id + ')">예약 취소</button>'
            : '';
        return '<div class="item">'
            + '<div class="time">' + formatDate(r.slotDate) + ' '
            + formatTime(r.startTime) + ' ~ ' + formatTime(r.endTime) + '</div>'
            + '<div class="meta"><span class="badge-status ' + reservationStatusClass(r.status) + '">'
            + reservationStatusLabel(r.status) + '</span>'
            + (r.memo ? ' &nbsp; ' + r.memo : '') + '</div>'
            + cancelBtn
            + '</div>';
    }

    async function cancelReservation(id) {
        if (!confirm('예약을 취소할까요?')) return;
        try {
            await api('DELETE', '/api/reservations/' + id);
            showMessage('msg', '예약을 취소했어요.', 'ok');
            loadMyReservations();
            loadSlots();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* ---------- 알림 ---------- */
    function toggleNotify() {
        document.getElementById('notifyPanel').classList.toggle('show');
    }

    async function loadNotifications() {
        try {
            const list = await api('GET', '/api/notifications/me');
            const countData = await api('GET', '/api/notifications/me/unread-count');
            const badge = document.getElementById('bellBadge');
            if (countData.unreadCount > 0) {
                badge.textContent = countData.unreadCount;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
            const box = document.getElementById('notifyList');
            if (list.length === 0) {
                box.innerHTML = '<div class="empty">알림이 없어요.</div>';
                return;
            }
            box.innerHTML = list.map(function (n) {
                return '<div class="notify-item ' + (n.read ? '' : 'unread') + '" '
                    + (n.read ? '' : 'onclick="readNotification(' + n.id + ')"') + '>'
                    + n.message
                    + '<div class="when">' + formatDateTime(n.createdAt) + '</div>'
                    + '</div>';
            }).join('');
        } catch (e) { /* 무시 */ }
    }

    async function readNotification(id) {
        try {
            await api('PATCH', '/api/notifications/' + id + '/read');
            loadNotifications();
        } catch (e) { /* 무시 */ }
    }
</script>
</body>
</html>
