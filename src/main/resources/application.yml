# ============================================
# Art-Sync 애플리케이션 설정
# ============================================
# 기본 프로필은 'local' (H2 인메모리 DB) 입니다.
# 실제 MySQL 로 돌리려면 실행 시 --spring.profiles.active=mysql 지정.

spring:
  profiles:
    active: local

server:
  port: ${SERVER_PORT:${PORT:8080}}

---
# --------- local: H2 인메모리 (개발/학습용) ---------
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:artsync;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true        # http://localhost:8080/h2-console 로 DB 확인 가능
  jpa:
    hibernate:
      ddl-auto: create-drop  # 앱 시작 시 테이블 생성, 종료 시 삭제
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# --------- mysql: 실제 MySQL ---------
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/artsync?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update       # 학습 단계. 운영에서는 validate + 마이그레이션 도구 권장
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
