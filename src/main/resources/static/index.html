<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art-Sync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-header">
    <h1>Art-Sync</h1>
</div>

<div class="container login-wrapper">

    <div class="login-logo">
        <div class="logo-mark">AS</div>
        <div class="logo-name">화실 예약 시스템</div>
        <div class="logo-sub">Art-Sync</div>
    </div>

    <!-- 이미 로그인 배너 -->
    <div id="alreadyBanner" style="display:none;background:#f0f0f0;border:1.5px solid #d0d0d0;border-radius:10px;padding:14px 16px;margin-bottom:16px;">
        <div style="font-size:15px;color:#111;font-weight:bold;margin-bottom:8px;">
            <span id="bannerName"></span> (<span id="bannerRole"></span>) 로 로그인되어 있어요
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-green btn-small" id="bannerGoBtn">내 페이지로 이동</button>
            <button class="btn btn-sub btn-small" onclick="doLogoutAndStay()">다른 계정으로</button>
        </div>
    </div>

    <!-- 탭 -->
    <div class="tabs">
        <button id="tabLogin"  class="active" onclick="switchTab('login')">로그인</button>
        <button id="tabSignup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- 로그인 섹션 -->
    <div id="loginSection">
        <div class="card">
            <label for="loginId">아이디</label>
            <input type="text" id="loginId" autocomplete="username" placeholder="아이디 입력">
            <label for="loginPw">비밀번호</label>
            <input type="password" id="loginPw" autocomplete="current-password" placeholder="비밀번호 입력">
            <button class="btn" onclick="doLogin()">로그인</button>
        </div>
    </div>

    <!-- 회원가입 섹션 -->
    <div id="signupSection" style="display:none;">
        <div class="card">

            <div class="role-section-label">어떤 역할로 시작할까요?</div>
            <div class="role-cards">
                <div class="role-card" id="suCardT" onclick="signupSelectRole('TEACHER')">
                    <span class="rc-check">✓</span>
                    <div class="rc-title">선생님</div>
                    <div class="rc-desc">수업을 만들고<br>시간대를 관리해요</div>
                </div>
                <div class="role-card" id="suCardP" onclick="signupSelectRole('PARTICIPANT')">
                    <span class="rc-check">✓</span>
                    <div class="rc-title">참여자</div>
                    <div class="rc-desc">열려있는 수업을<br>찾아 예약해요</div>
                </div>
            </div>

            <label for="suId" style="margin-top:18px;">아이디</label>
            <input type="text" id="suId" autocomplete="username" placeholder="영문/숫자 조합">
            <label for="suPw">비밀번호</label>
            <input type="password" id="suPw" autocomplete="new-password" placeholder="6자 이상">
            <label for="suName">이름</label>
            <input type="text" id="suName" placeholder="실명을 입력해 주세요">
            <label for="suPhone">연락처 <span style="font-weight:normal;color:#aaa;">(선택)</span></label>
            <input type="text" id="suPhone" placeholder="010-0000-0000">

            <button class="btn" id="suSubmitBtn" onclick="doSignup()" style="margin-top:18px;" disabled>
                가입하기
            </button>
        </div>
    </div>

</div>

<script src="app.js"></script>
<script>
    let _signupRole = null;

    /* 이미 로그인 확인 */
    (async () => {
        try {
            const user = await api('GET', '/api/auth/me');
            const label = user.sessionRole === 'TEACHER' ? '선생님' : '참여자';
            document.getElementById('bannerName').textContent = user.name;
            document.getElementById('bannerRole').textContent = label;
            document.getElementById('bannerGoBtn').onclick = () => {
                location.href = user.sessionRole === 'TEACHER' ? 'admin.html' : 'member.html';
            };
            document.getElementById('alreadyBanner').style.display = 'block';
        } catch (_) {}
    })();

    /* 탭 전환 */
    function switchTab(which) {
        const isLogin = which === 'login';
        document.getElementById('tabLogin').classList.toggle('active', isLogin);
        document.getElementById('tabSignup').classList.toggle('active', !isLogin);
        document.getElementById('loginSection').style.display  = isLogin ? '' : 'none';
        document.getElementById('signupSection').style.display = isLogin ? 'none' : '';
        document.getElementById('msg').className = 'msg';
    }

    /* 로그인 — 단일 단계 */
    async function doLogin() {
        const loginId  = document.getElementById('loginId').value.trim();
        const password = document.getElementById('loginPw').value;
        if (!loginId || !password) {
            showMessage('msg', '아이디와 비밀번호를 입력해 주세요.', 'error');
            return;
        }
        try {
            const user = await api('POST', '/api/auth/login', { loginId, password });
            location.href = user.sessionRole === 'TEACHER' ? 'admin.html' : 'member.html';
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loginPw').addEventListener('keyup', e => {
            if (e.key === 'Enter') doLogin();
        });
    });

    /* 회원가입 */
    function signupSelectRole(role) {
        _signupRole = role;
        document.getElementById('suCardT').classList.toggle('selected', role === 'TEACHER');
        document.getElementById('suCardP').classList.toggle('selected', role === 'PARTICIPANT');
        document.getElementById('suSubmitBtn').disabled = false;
    }

    async function doSignup() {
        if (!_signupRole) {
            showMessage('msg', '역할을 먼저 선택해 주세요.', 'error');
            return;
        }
        const loginId = document.getElementById('suId').value.trim();
        const password = document.getElementById('suPw').value;
        const name     = document.getElementById('suName').value.trim();
        const phone    = document.getElementById('suPhone').value.trim();

        if (!loginId || !password || !name) {
            showMessage('msg', '아이디, 비밀번호, 이름은 꼭 입력해 주세요.', 'error');
            return;
        }
        try {
            await api('POST', '/api/auth/signup', { loginId, password, name, phone, role: _signupRole });
            const user = await api('POST', '/api/auth/login', { loginId, password });
            location.href = user.sessionRole === 'TEACHER' ? 'admin.html' : 'member.html';
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* 다른 계정으로 */
    async function doLogoutAndStay() {
        try { await api('POST', '/api/auth/logout'); } catch (_) {}
        document.getElementById('alreadyBanner').style.display = 'none';
        showMessage('msg', '로그아웃됐어요. 다시 로그인해 주세요.', 'ok');
    }
</script>
</body>
</html>
