<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBIBBIART</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-header">
    <h1>BBIBBIART</h1>
</div>

<div class="container login-wrapper">

    <div class="login-logo">
        <div class="logo-mark">BB</div>
        <div class="logo-name">BBIBBIART</div>
        <div class="logo-sub">수업 예약 시스템</div>
    </div>

    <!-- 이미 로그인 배너 -->
    <div id="alreadyBanner" style="display:none;background:#f0f0f0;border:1.5px solid #d0d0d0;border-radius:10px;padding:14px 16px;margin-bottom:16px;">
        <div style="font-size:15px;color:#111;font-weight:bold;margin-bottom:8px;">
            <span id="bannerName"></span> (<span id="bannerRole"></span>) 로 로그인되어 있어요
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-green btn-small" id="bannerGoBtn">내 페이지로 이동</button>
            <button class="btn btn-sub btn-small" onclick="doLogoutAndStay()">다른 계정으로</button>
        </div>
    </div>

    <!-- 탭 -->
    <div class="tabs">
        <button id="tabLogin"  class="active" onclick="switchTab('login')">로그인</button>
        <button id="tabSignup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- 로그인 섹션 -->
    <div id="loginSection">
        <div class="card">
            <label for="loginId">아이디</label>
            <input type="text" id="loginId" autocomplete="username" placeholder="아이디 입력">
            <label for="loginPw">비밀번호</label>
            <input type="password" id="loginPw" autocomplete="current-password" placeholder="비밀번호 입력">
            <button class="btn" onclick="doLogin()">로그인</button>

            <div class="account-find-actions">
                <button type="button" onclick="showAccountHelp('id')">아이디 찾기</button>
                <span></span>
                <button type="button" onclick="showAccountHelp('password')">비밀번호 재설정</button>
            </div>

            <div id="findIdPanel" class="account-help-panel" style="display:none;">
                <div class="account-help-title">아이디 찾기</div>
                <label for="findIdName">이름</label>
                <input type="text" id="findIdName" autocomplete="name" placeholder="가입한 이름">
                <label for="findIdPhone">연락처</label>
                <input type="text" id="findIdPhone" autocomplete="tel" placeholder="010-0000-0000">
                <label for="findIdQuestion">복구 질문</label>
                <select id="findIdQuestion" autocomplete="off"></select>
                <label for="findIdAnswer">복구 질문 답변</label>
                <input type="text" id="findIdAnswer" autocomplete="off" placeholder="가입할 때 입력한 답변">
                <button class="btn btn-sub" type="button" onclick="findLoginId()">아이디 확인</button>
                <div id="findIdResult" class="account-help-result" style="display:none;"></div>
            </div>

            <div id="resetPwPanel" class="account-help-panel" style="display:none;">
                <div class="account-help-title">비밀번호 재설정</div>
                <label for="resetLoginId">아이디</label>
                <input type="text" id="resetLoginId" autocomplete="username" placeholder="아이디 입력">
                <label for="resetName">이름</label>
                <input type="text" id="resetName" autocomplete="name" placeholder="가입한 이름">
                <label for="resetPhone">연락처</label>
                <input type="text" id="resetPhone" autocomplete="tel" placeholder="010-0000-0000">
                <label for="resetQuestion">복구 질문</label>
                <select id="resetQuestion" autocomplete="off"></select>
                <label for="resetAnswer">복구 질문 답변</label>
                <input type="text" id="resetAnswer" autocomplete="off" placeholder="가입할 때 입력한 답변">
                <label for="resetNewPw">새 비밀번호</label>
                <input type="password" id="resetNewPw" autocomplete="new-password" placeholder="6자 이상">
                <label for="resetNewPwConfirm">새 비밀번호 확인</label>
                <input type="password" id="resetNewPwConfirm" autocomplete="new-password" placeholder="한 번 더 입력">
                <button class="btn btn-sub" type="button" onclick="resetPassword()">새 비밀번호 저장</button>
            </div>
        </div>
    </div>

    <!-- 회원가입 섹션 -->
    <div id="signupSection" style="display:none;">
        <div class="card">

            <div class="role-section-label">어떤 역할로 시작할까요?</div>
            <div class="role-cards">
                <div class="role-card" id="suCardT" onclick="signupSelectRole('TEACHER')">
                    <span class="rc-check">✓</span>
                    <div class="rc-title">선생님</div>
                    <div class="rc-desc">수업을 만들고<br>시간대를 관리해요</div>
                </div>
                <div class="role-card" id="suCardP" onclick="signupSelectRole('PARTICIPANT')">
                    <span class="rc-check">✓</span>
                    <div class="rc-title">참여자</div>
                    <div class="rc-desc">열려있는 수업을<br>찾아 예약해요</div>
                </div>
            </div>

            <label for="suId" style="margin-top:18px;">아이디</label>
            <input type="text" id="suId" autocomplete="username" placeholder="영문/숫자 조합">
            <label for="suPw">비밀번호</label>
            <input type="password" id="suPw" autocomplete="new-password" placeholder="6자 이상">
            <label for="suName">이름</label>
            <input type="text" id="suName" placeholder="실명을 입력해 주세요">
            <label for="suPhone">연락처</label>
            <input type="text" id="suPhone" placeholder="010-0000-0000">
            <div class="recovery-question-group">
                <div class="account-help-title">아이디/비밀번호 찾기 질문</div>
                <label for="suQuestion">복구 질문</label>
                <select id="suQuestion" autocomplete="off"></select>
                <label for="suAnswer">복구 질문 답변</label>
                <input type="text" id="suAnswer" autocomplete="off" placeholder="답변 입력">
            </div>

            <button class="btn" id="suSubmitBtn" onclick="doSignup()" style="margin-top:18px;" disabled>
                가입하기
            </button>
        </div>
    </div>

</div>

<script src="app.js"></script>
<script>
    let _signupRole = null;
    const SECURITY_QUESTIONS = [
        { value: 'Q01', text: '나의 가장 소중한 것은?' },
        { value: 'Q02', text: '가장 좋은 기억을 가지고 있는 곳은?' },
        { value: 'Q03', text: '어릴 적 가장 좋아했던 별명은?' },
        { value: 'Q04', text: '처음 키웠던 반려동물의 이름은?' },
        { value: 'Q05', text: '가장 좋아하는 색깔은?' },
        { value: 'Q06', text: '가장 좋아하는 음식은?' },
        { value: 'Q07', text: '가장 존경하는 사람은?' },
        { value: 'Q08', text: '처음 다닌 학교 이름은?' },
        { value: 'Q09', text: '가장 기억에 남는 여행지는?' },
        { value: 'Q10', text: '내가 가장 좋아하는 작품이나 노래는?' }
    ];

    /* 이미 로그인 확인 */
    (async () => {
        try {
            const user = await api('GET', '/api/auth/me');
            const label = user.sessionRole === 'TEACHER' ? '선생님' : '참여자';
            document.getElementById('bannerName').textContent = user.name;
            document.getElementById('bannerRole').textContent = label;
            document.getElementById('bannerGoBtn').onclick = () => {
                location.href = user.sessionRole === 'TEACHER' ? 'admin.html' : 'member.html';
            };
            document.getElementById('alreadyBanner').style.display = 'block';
        } catch (_) {}
    })();

    /* 탭 전환 */
    function switchTab(which) {
        const isLogin = which === 'login';
        document.getElementById('tabLogin').classList.toggle('active', isLogin);
        document.getElementById('tabSignup').classList.toggle('active', !isLogin);
        document.getElementById('loginSection').style.display  = isLogin ? '' : 'none';
        document.getElementById('signupSection').style.display = isLogin ? 'none' : '';
        document.getElementById('msg').className = 'msg';
    }

    /* 로그인 — 단일 단계 */
    async function doLogin() {
        const loginId  = document.getElementById('loginId').value.trim();
        const password = document.getElementById('loginPw').value;
        if (!loginId || !password) {
            showMessage('msg', '아이디와 비밀번호를 입력해 주세요.', 'error');
            return;
        }
        try {
            const user = await api('POST', '/api/auth/login', { loginId, password });
            location.href = user.sessionRole === 'TEACHER' ? 'admin.html' : 'member.html';
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initSecurityQuestionSelects();
        document.getElementById('loginPw').addEventListener('keyup', e => {
            if (e.key === 'Enter') doLogin();
        });
    });

    function initSecurityQuestionSelects() {
        ['suQuestion', 'findIdQuestion', 'resetQuestion'].forEach(id => {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">질문 선택</option>' +
                SECURITY_QUESTIONS.map(q => '<option value="' + q.value + '">' + q.text + '</option>').join('');
        });
    }

    function showAccountHelp(which) {
        const showId = which === 'id';
        const findPanel = document.getElementById('findIdPanel');
        const resetPanel = document.getElementById('resetPwPanel');
        findPanel.style.display = showId && findPanel.style.display === 'none' ? '' : 'none';
        resetPanel.style.display = !showId && resetPanel.style.display === 'none' ? '' : 'none';
        document.getElementById('findIdResult').style.display = 'none';
        document.getElementById('msg').className = 'msg';
    }

    async function findLoginId() {
        const name = document.getElementById('findIdName').value.trim();
        const phone = document.getElementById('findIdPhone').value.trim();
        const securityQuestion = document.getElementById('findIdQuestion').value;
        const securityAnswer = document.getElementById('findIdAnswer').value.trim();
        if (!name || !phone || !securityQuestion || !securityAnswer) {
            showMessage('msg', '이름, 연락처, 복구 질문과 답변을 모두 입력해 주세요.', 'error');
            return;
        }

        try {
            const result = await api('POST', '/api/auth/find-login-id',
                { name, phone, securityQuestion, securityAnswer });
            const loginIds = result.loginIds.join(', ');
            const resultBox = document.getElementById('findIdResult');
            resultBox.textContent = '가입된 아이디: ' + loginIds;
            resultBox.style.display = 'block';
            document.getElementById('loginId').value = result.loginIds[0];
        } catch (e) {
            document.getElementById('findIdResult').style.display = 'none';
            showMessage('msg', e.message, 'error');
        }
    }

    async function resetPassword() {
        const loginId = document.getElementById('resetLoginId').value.trim();
        const name = document.getElementById('resetName').value.trim();
        const phone = document.getElementById('resetPhone').value.trim();
        const securityQuestion = document.getElementById('resetQuestion').value;
        const securityAnswer = document.getElementById('resetAnswer').value.trim();
        const newPassword = document.getElementById('resetNewPw').value;
        const confirmPassword = document.getElementById('resetNewPwConfirm').value;

        if (!loginId || !name || !phone || !securityQuestion || !securityAnswer || !newPassword || !confirmPassword) {
            showMessage('msg', '아이디, 이름, 연락처, 복구 질문과 답변, 새 비밀번호를 모두 입력해 주세요.', 'error');
            return;
        }
        if (newPassword.length < 6) {
            showMessage('msg', '새 비밀번호는 6자 이상이어야 합니다.', 'error');
            return;
        }
        if (newPassword !== confirmPassword) {
            showMessage('msg', '새 비밀번호가 서로 달라요.', 'error');
            return;
        }

        try {
            await api('POST', '/api/auth/reset-password',
                { loginId, name, phone, securityQuestion, securityAnswer, newPassword });
            document.getElementById('loginId').value = loginId;
            document.getElementById('loginPw').value = '';
            document.getElementById('resetNewPw').value = '';
            document.getElementById('resetNewPwConfirm').value = '';
            document.getElementById('resetPwPanel').style.display = 'none';
            showMessage('msg', '비밀번호가 변경됐어요. 새 비밀번호로 로그인해 주세요.', 'ok');
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* 회원가입 */
    function signupSelectRole(role) {
        _signupRole = role;
        document.getElementById('suCardT').classList.toggle('selected', role === 'TEACHER');
        document.getElementById('suCardP').classList.toggle('selected', role === 'PARTICIPANT');
        document.getElementById('suSubmitBtn').disabled = false;
    }

    async function doSignup() {
        if (!_signupRole) {
            showMessage('msg', '역할을 먼저 선택해 주세요.', 'error');
            return;
        }
        const loginId = document.getElementById('suId').value.trim();
        const password = document.getElementById('suPw').value;
        const name     = document.getElementById('suName').value.trim();
        const phone    = document.getElementById('suPhone').value.trim();
        const securityQuestion = document.getElementById('suQuestion').value;
        const securityAnswer = document.getElementById('suAnswer').value.trim();

        if (!loginId || !password || !name || !phone || !securityQuestion || !securityAnswer) {
            showMessage('msg', '아이디, 비밀번호, 이름, 연락처, 복구 질문과 답변은 꼭 입력해 주세요.', 'error');
            return;
        }
        try {
            await api('POST', '/api/auth/signup',
                { loginId, password, name, phone, securityQuestion, securityAnswer, role: _signupRole });
            const user = await api('POST', '/api/auth/login', { loginId, password });
            location.href = user.sessionRole === 'TEACHER' ? 'admin.html' : 'member.html';
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* 다른 계정으로 */
    async function doLogoutAndStay() {
        try { await api('POST', '/api/auth/logout'); } catch (_) {}
        document.getElementById('alreadyBanner').style.display = 'none';
        showMessage('msg', '로그아웃됐어요. 다시 로그인해 주세요.', 'ok');
    }
</script>
</body>
</html>
