<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art-Sync | 선생님 화면</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .space-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .space-card {
            flex: 1 1 160px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 14px 12px;
            cursor: pointer;
            background: #fff;
            transition: border-color 0.15s, background 0.15s;
            position: relative;
        }
        .space-card:hover { border-color: #111; }
        .space-card.selected { border-color: #111; background: #f0f0f0; }
        .space-card .sc-check {
            display: none;
            position: absolute; top: 8px; right: 10px;
            font-size: 13px; color: #111; font-weight: bold;
        }
        .space-card.selected .sc-check { display: block; }
        .space-card .sc-name { font-weight: bold; font-size: 15px; color: #111; margin-bottom: 4px; }
        .space-card .sc-desc { font-size: 12px; color: var(--text-sub); line-height: 1.4; }
        .space-card .sc-delete {
            display: none;
            position: absolute; bottom: 8px; right: 8px;
            font-size: 11px; color: #999; background: none; border: 1px solid #ddd;
            border-radius: 5px; padding: 2px 7px; cursor: pointer; line-height: 1.6;
        }
        .space-card:hover .sc-delete { display: block; }
        .space-card .sc-delete:hover { color: #c00; border-color: #c00; background: #fff4f4; }

        .create-space-form {
            margin-top: 14px;
            padding: 14px;
            border: 1.5px dashed var(--border);
            border-radius: 10px;
            background: #fafafa;
        }
        .create-space-form label { font-size: 13px; color: var(--text-sub); }
        .create-space-form input, .create-space-form textarea {
            width: 100%; margin: 4px 0 10px; box-sizing: border-box;
            border: 1.5px solid var(--border); border-radius: 8px;
            padding: 8px 10px; font-size: 14px; font-family: inherit;
            outline: none; transition: border-color 0.15s;
        }
        .create-space-form input:focus, .create-space-form textarea:focus { border-color: #111; }
        .create-space-form textarea { height: 56px; resize: none; }

        .no-space-hint {
            text-align: center;
            padding: 30px 0 10px;
            color: var(--text-sub);
            font-size: 14px;
        }

        .space-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 14px;
            border: 1px solid #d8d8d8;
            flex-wrap: wrap;
        }
        .space-bar .sb-name { font-weight: bold; color: #111; font-size: 15px; flex: 1; }
        .space-bar .sb-label { font-size: 12px; color: var(--text-sub); }

        /* 회원 현황판 */
        .member-stat-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .member-stat-row:last-child { border-bottom: none; }
        .ms-name { font-weight: 600; font-size: 14px; flex: 1; }
        .ms-usage { font-size: 13px; color: #444; min-width: 80px; }
        .ms-usage.over { color: #c00; font-weight: bold; }
        .ms-limit-input {
            width: 56px; text-align: center;
            border: 1.5px solid var(--border); border-radius: 6px;
            padding: 4px 6px; font-size: 13px; font-family: inherit;
        }
        .ms-limit-input:focus { outline: none; border-color: #111; }
        .usage-bar-wrap { width: 80px; height: 6px; background: #eee; border-radius: 3px; }
        .usage-bar { height: 6px; border-radius: 3px; background: #111; transition: width 0.3s; }
        .usage-bar.full { background: #c00; }
    </style>
</head>
<body>
<div class="app-header">
    <h1>수업 관리</h1>
    <div class="right">
        <button class="bell" onclick="toggleNotify()">알림<span id="bellBadge" class="badge" style="display:none;">0</span></button>
        <button class="btn-small btn-sub" onclick="logout()">로그아웃</button>
    </div>
</div>

<div class="container">
    <p id="hello" class="greeting"></p>

    <!-- 알림 패널 -->
    <div id="notifyPanel" class="card notify-panel">
        <div class="card-header"><span class="card-title">알림</span></div>
        <div id="notifyList"></div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- 수업 선택 카드 -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">내 수업</span>
            <button class="btn btn-green btn-small" onclick="toggleCreateSpaceForm()">+ 새 수업</button>
        </div>

        <div class="space-cards" id="spaceCards">
            <div class="empty">수업을 불러오는 중...</div>
        </div>

        <div class="create-space-form" id="createSpaceForm" style="display:none;">
            <label>수업 이름 *</label>
            <input type="text" id="newSpaceName" placeholder="예: 수채화 기초반">
            <label>수업 설명 (선택)</label>
            <textarea id="newSpaceDesc" placeholder="수업에 대한 간단한 설명"></textarea>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-green btn-small" onclick="createSpace()">만들기</button>
                <button class="btn btn-sub btn-small" onclick="toggleCreateSpaceForm()">취소</button>
            </div>
        </div>
    </div>

    <!-- 수업 미선택 안내 -->
    <div id="noSpaceHint" class="card" style="display:none;">
        <div class="no-space-hint">위에서 관리할 수업을 선택하거나 새 수업을 만들어 주세요.</div>
    </div>

    <div id="mainContent" style="display:none;">

        <div class="space-bar">
            <span class="sb-label">현재 수업</span>
            <span class="sb-name" id="currentSpaceLabel">—</span>
        </div>

        <!-- 월별 다이어리 -->
        <div class="card">
            <div class="collapsible-header" onclick="toggleSection('diary')">
                <span class="card-title">월별 다이어리</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div id="diaryBody" class="collapsible-body open">
                <div class="cal-nav">
                    <button class="btn btn-sub btn-small" onclick="moveDiaryMonth(-1)">이전</button>
                    <span id="diaryMonthLabel" class="cal-month-label"></span>
                    <button class="btn btn-sub btn-small" onclick="moveDiaryMonth(1)">다음</button>
                </div>
                <div id="calGrid"></div>
                <div id="dayDetailPanel" class="day-detail-panel" style="display:none;">
                    <div class="day-detail-header">
                        <span id="dayDetailTitle" class="day-detail-title-text"></span>
                        <button class="btn-close" onclick="closeDayDetail()">✕</button>
                    </div>
                    <div id="dayDetailContent" class="day-detail-content"></div>
                </div>
            </div>
        </div>

        <!-- 처리할 예약 요청 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title" id="pendingTitle">처리할 예약 요청</span>
                <button class="btn btn-green btn-small" id="confirmAllBtn" style="display:none;" onclick="confirmAllReservations()">전체 수락</button>
            </div>
            <div id="pendingList"></div>
        </div>

        <!-- 시간대 만들기 -->
        <div class="card">
            <div class="collapsible-header" onclick="toggleSection('createSlot')">
                <span class="card-title">시간대 만들기</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div id="createSlotBody" class="collapsible-body">
                <div class="date-mode-tabs">
                    <button class="tab-btn active" id="tabSingle" onclick="setDateMode('single')">단일 날짜</button>
                    <button class="tab-btn" id="tabRepeat" onclick="setDateMode('repeat')">요일 반복</button>
                </div>

                <div id="modeSingle">
                    <label for="cDate">날짜</label>
                    <input type="date" id="cDate" onchange="onAdminDateChange()">
                    <div id="adminDateWarning" class="date-warning" style="display:none;"></div>
                </div>

                <div id="modeRepeat" style="display:none;">
                    <div class="repeat-range">
                        <div>
                            <label for="rFrom">시작일</label>
                            <input type="date" id="rFrom" onchange="updateRepeatPreview()">
                        </div>
                        <div>
                            <label for="rTo">종료일</label>
                            <input type="date" id="rTo" onchange="updateRepeatPreview()">
                        </div>
                    </div>
                    <span class="weekday-label">반복 요일</span>
                    <div class="weekday-btns">
                        <button class="wd-btn" data-dow="0" onclick="toggleDow(0)">일</button>
                        <button class="wd-btn" data-dow="1" onclick="toggleDow(1)">월</button>
                        <button class="wd-btn" data-dow="2" onclick="toggleDow(2)">화</button>
                        <button class="wd-btn" data-dow="3" onclick="toggleDow(3)">수</button>
                        <button class="wd-btn" data-dow="4" onclick="toggleDow(4)">목</button>
                        <button class="wd-btn" data-dow="5" onclick="toggleDow(5)">금</button>
                        <button class="wd-btn" data-dow="6" onclick="toggleDow(6)">토</button>
                    </div>
                    <div id="repeatPreview" class="repeat-preview">
                        <span class="preview-empty">날짜 범위와 요일을 선택하면 대상 날짜가 표시됩니다.</span>
                    </div>
                </div>

                <div class="slot-grid-settings">
                    <div>
                        <label for="cMinutes">한 타임 길이 (분)</label>
                        <input type="number" id="cMinutes" value="120" min="10" step="10" onchange="renderTimeGrid()">
                    </div>
                    <div>
                        <label for="cCapacity">최대 인원</label>
                        <input type="number" id="cCapacity" value="4" min="1">
                    </div>
                </div>

                <p class="time-grid-hint">열고 싶은 시간대를 클릭해서 선택하세요.</p>
                <div class="time-section-label">오전</div>
                <div id="timeGridAm" class="time-grid"></div>
                <div class="time-section-label">오후</div>
                <div id="timeGridPm" class="time-grid"></div>

                <div id="selectedCount" class="selected-count" style="display:none;"></div>
                <label class="auto-activate-label" id="autoActivateWrap" style="display:none;">
                    <input type="checkbox" id="autoActivate" checked>
                    만들면서 바로 공개 <span style="font-weight:normal;color:#888;">(참여자에게 즉시 노출)</span>
                </label>
                <button class="btn" id="createBtn" onclick="createSlotsFromGrid()" style="display:none;">선택한 시간대 만들기</button>
                <p id="activateHint" style="margin-top:8px;color:#aaa;font-size:13px;">만든 뒤 "시간대 관리"에서 공개 버튼을 눌러야 참여자에게 보여요.</p>
            </div>
        </div>

        <!-- 회원 현황판 -->
        <div class="card">
            <div class="collapsible-header" onclick="toggleSection('memberBoard')">
                <span class="card-title">회원 현황판</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div id="memberBoardBody" class="collapsible-body">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
                    <span style="font-size:13px;color:var(--text-sub);">이번 달 수업 신청 현황 및 월간 한도 관리</span>
                    <button class="btn btn-sub btn-small" onclick="loadMemberBoard()">새로고침</button>
                </div>
                <div id="memberBoardList"><div class="empty">회원 정보를 불러오는 중...</div></div>
            </div>
        </div>

        <!-- 시간대 관리 -->
        <div class="card">
            <div class="collapsible-header" onclick="toggleSection('manageSlot')">
                <span class="card-title">시간대 관리 / 공개</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div id="manageSlotBody" class="collapsible-body">
                <div class="date-row" style="margin-bottom:0;">
                    <input type="date" id="mDate">
                    <button class="btn btn-sub btn-small" onclick="loadAdminSlots()">이 날짜 보기</button>
                </div>
                <div id="adminSlotList" style="margin-top:14px;"></div>
            </div>
        </div>

    </div>
</div>

<script src="app.js"></script>
<script>
    let currentUser = null;
    let currentSpaceId = null;

    (async function init() {
        currentUser = await requireLogin('TEACHER');
        if (!currentUser) return;
        document.getElementById('hello').innerHTML =
            '<strong>' + currentUser.name + '</strong> 님, 선생님 모드입니다.';

        const today = todayIso();
        document.getElementById('cDate').value = today;
        document.getElementById('mDate').value = today;

        await loadMySpaces();
        loadNotifications();
    })();

    /* ── 수업 관리 ── */
    async function loadMySpaces() {
        try {
            const spaces = await api('GET', '/api/spaces/my');
            renderSpaceCards(spaces);
            if (spaces.length === 1) selectSpace(spaces[0].id, spaces[0].name);
            else if (spaces.length === 0) showNoSpaceHint();
        } catch (e) {
            document.getElementById('spaceCards').innerHTML =
                '<div class="empty">' + e.message + '</div>';
        }
    }

    function renderSpaceCards(spaces) {
        const box = document.getElementById('spaceCards');
        if (spaces.length === 0) {
            box.innerHTML = '<div class="empty">아직 만든 수업이 없어요. "+ 새 수업" 버튼으로 시작해 보세요.</div>';
            showNoSpaceHint();
            return;
        }
        box.innerHTML = spaces.map(s =>
            '<div class="space-card' + (s.id === currentSpaceId ? ' selected' : '') + '" '
            + 'id="sc-' + s.id + '" onclick="selectSpace(' + s.id + ', \'' + escHtml(s.name) + '\')">'
            + '<span class="sc-check">✓</span>'
            + '<div class="sc-name">' + escHtml(s.name) + '</div>'
            + (s.description ? '<div class="sc-desc">' + escHtml(s.description) + '</div>' : '')
            + '<button class="sc-delete" onclick="deleteSpace(' + s.id + ', \'' + escHtml(s.name) + '\', event)">삭제</button>'
            + '</div>'
        ).join('');
        hideNoSpaceHint();
    }

    function selectSpace(id, name) {
        currentSpaceId = id;
        document.querySelectorAll('.space-card').forEach(el => el.classList.remove('selected'));
        const card = document.getElementById('sc-' + id);
        if (card) card.classList.add('selected');

        document.getElementById('currentSpaceLabel').textContent = name;
        document.getElementById('mainContent').style.display = 'block';
        hideNoSpaceHint();

        existingSlots = [];
        selectedTimes.clear();
        renderTimeGrid();
        loadDiary();
        loadPending();
        loadMemberBoard();
    }

    function showNoSpaceHint() {
        document.getElementById('noSpaceHint').style.display = '';
        document.getElementById('mainContent').style.display = 'none';
    }
    function hideNoSpaceHint() {
        document.getElementById('noSpaceHint').style.display = 'none';
    }

    function toggleCreateSpaceForm() {
        const form = document.getElementById('createSpaceForm');
        const visible = form.style.display !== 'none';
        form.style.display = visible ? 'none' : 'block';
        if (!visible) document.getElementById('newSpaceName').focus();
    }

    async function createSpace() {
        const name = document.getElementById('newSpaceName').value.trim();
        const desc = document.getElementById('newSpaceDesc').value.trim();
        if (!name) { showMessage('msg', '수업 이름을 입력해 주세요.', 'error'); return; }
        try {
            await api('POST', '/api/spaces', { name, description: desc });
            document.getElementById('newSpaceName').value = '';
            document.getElementById('newSpaceDesc').value = '';
            document.getElementById('createSpaceForm').style.display = 'none';
            showMessage('msg', '수업을 만들었어요!', 'ok');
            await loadMySpaces();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    async function deleteSpace(id, name, event) {
        event.stopPropagation();
        if (!confirm('[' + name + '] 수업을 삭제할까요?\n진행 중인 예약이 없어야 삭제할 수 있습니다.')) return;
        try {
            await api('DELETE', '/api/spaces/' + id);
            if (currentSpaceId === id) {
                currentSpaceId = null;
                document.getElementById('mainContent').style.display = 'none';
            }
            showMessage('msg', '수업을 삭제했어요.', 'ok');
            await loadMySpaces();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    /* ── 월별 다이어리 ── */
    function localDateIso(d) {
        return d.getFullYear() + '-'
            + String(d.getMonth() + 1).padStart(2, '0') + '-'
            + String(d.getDate()).padStart(2, '0');
    }

    let diaryYear  = new Date().getFullYear();
    let diaryMonth = new Date().getMonth() + 1;
    let diaryDataMap = {};

    async function loadDiary() {
        if (!currentSpaceId) return;
        document.getElementById('diaryMonthLabel').textContent =
            diaryYear + '년 ' + diaryMonth + '월';
        try {
            const list = await api('GET',
                '/api/spaces/' + currentSpaceId + '/reservations/monthly-summary?year=' + diaryYear + '&month=' + diaryMonth);
            diaryDataMap = {};
            list.forEach(d => { diaryDataMap[d.date] = d; });
        } catch (e) { diaryDataMap = {}; }
        renderCalendar();
    }

    function moveDiaryMonth(delta) {
        diaryMonth += delta;
        if (diaryMonth > 12) { diaryMonth = 1; diaryYear++; }
        if (diaryMonth < 1)  { diaryMonth = 12; diaryYear--; }
        closeDayDetail();
        loadDiary();
    }

    function renderCalendar() {
        const firstDow    = new Date(diaryYear, diaryMonth - 1, 1).getDay();
        const daysInMonth = new Date(diaryYear, diaryMonth, 0).getDate();
        const todayStr    = todayIso();
        const DOW_LABELS  = ['일','월','화','수','목','금','토'];

        let html = '<div class="cal-header-row">'
            + DOW_LABELS.map(d => '<div class="cal-hcell">' + d + '</div>').join('')
            + '</div><div class="cal-body">';

        for (let i = 0; i < firstDow; i++) html += '<div class="cal-cell empty"></div>';

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = diaryYear + '-' + pad(diaryMonth) + '-' + pad(d);
            const summary = diaryDataMap[dateStr];
            const isToday = dateStr === todayStr;

            let cls = 'cal-cell';
            if (isToday) cls += ' cal-today';

            let inner = '<div class="cal-day-num">' + d + '</div>';

            if (summary) {
                if (summary.reservations.length > 0) {
                    const hasPending = summary.reservations.some(r => r.status === 'REQUESTED');
                    cls += hasPending ? ' cal-has-pending' : ' cal-has-res';

                    const nameMap = {};
                    summary.reservations.forEach(r => {
                        const nm = r.memberName || ('회원#' + r.memberId);
                        if (!nameMap[nm]) nameMap[nm] = [];
                        nameMap[nm].push(formatTime(r.startTime));
                    });
                    const names = Object.keys(nameMap);
                    names.slice(0, 2).forEach(nm => {
                        inner += '<div class="cal-name">' + nm + '</div>';
                    });
                    if (names.length > 2)
                        inner += '<div class="cal-more">+' + (names.length - 2) + '명 더</div>';

                    const timeGroups = {};
                    [...summary.reservations]
                        .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''))
                        .forEach(r => {
                            const t = formatTime(r.startTime);
                            if (!timeGroups[t]) timeGroups[t] = [];
                            timeGroups[t].push(r);
                        });
                    let popupRows = Object.entries(timeGroups).map(([time, rs]) => {
                        const nameSpans = rs.map(r => {
                            const nm   = r.memberName || ('회원#' + r.memberId);
                            const sc   = r.status === 'CONFIRMED' ? '확정' : '대기';
                            return '<span class="popup-name">[' + sc + '] ' + nm + '</span>';
                        }).join('');
                        return '<div class="popup-row">'
                            + '<span class="popup-time">' + time + '</span>'
                            + '<span class="popup-names">' + nameSpans + '</span>'
                            + '</div>';
                    }).join('');
                    inner += '<div class="cal-hover-popup">'
                        + '<div class="popup-header">예약 현황</div>'
                        + popupRows
                        + '</div>';
                } else if (summary.slotCount > 0) {
                    cls += ' cal-has-slots';
                    inner += '<div class="cal-slot-count">' + summary.slotCount + '타임</div>';
                }
            }

            html += '<div class="' + cls + '" onclick="openDayDetail(\'' + dateStr + '\')">' + inner + '</div>';
        }

        const filled = firstDow + daysInMonth;
        const rem = filled % 7 === 0 ? 0 : 7 - (filled % 7);
        for (let i = 0; i < rem; i++) html += '<div class="cal-cell empty"></div>';
        html += '</div>';

        html += '<div class="cal-legend">'
            + '<span class="legend-item"><span class="legend-dot" style="background:#111;"></span>슬롯만</span>'
            + '<span class="legend-item"><span class="legend-dot" style="background:#333;"></span>예약 확정</span>'
            + '<span class="legend-item"><span class="legend-dot" style="background:#fff;border:2px dashed #888;"></span>예약 대기</span>'
            + '</div>';

        document.getElementById('calGrid').innerHTML = html;
    }

    function openDayDetail(dateStr) {
        const panel = document.getElementById('dayDetailPanel');
        const title = document.getElementById('dayDetailTitle');
        const body  = document.getElementById('dayDetailContent');

        const [y, m, d] = dateStr.split('-').map(Number);
        const DOW_KO = ['일','월','화','수','목','금','토'];
        const dow = new Date(y, m - 1, d).getDay();
        title.textContent = y + '년 ' + m + '월 ' + d + '일 (' + DOW_KO[dow] + ')';

        const summary = diaryDataMap[dateStr];
        if (!summary) {
            body.innerHTML = '<div class="empty">이 날짜에 만든 시간대가 없어요.</div>';
        } else if (summary.reservations.length === 0) {
            body.innerHTML = '<div class="empty">시간대 ' + summary.slotCount + '개가 있지만 예약이 없어요.</div>';
        } else {
            const slotMap = {};
            summary.reservations.forEach(r => {
                const key = formatTime(r.startTime) + ' ~ ' + formatTime(r.endTime);
                if (!slotMap[key]) slotMap[key] = [];
                slotMap[key].push(r);
            });
            let html = '';
            Object.entries(slotMap).sort((a,b) => a[0].localeCompare(b[0])).forEach(([time, rs]) => {
                html += '<div style="margin-bottom:12px;">'
                    + '<div style="font-weight:bold;color:#111;font-size:15px;margin-bottom:6px;">' + time + '</div>';
                rs.forEach(r => {
                    const nm  = r.memberName || ('회원#' + r.memberId);
                    const sc  = r.status === 'CONFIRMED' ? 'st-confirmed' : 'st-requested';
                    const sl  = r.status === 'CONFIRMED' ? '확정' : '대기중';
                    html += '<div class="member-row">'
                        + '<span class="member-name">' + nm + '</span>'
                        + '&nbsp;<span class="badge-status ' + sc + '">' + sl + '</span>'
                        + '</div>';
                });
                html += '</div>';
            });
            body.innerHTML = html;
        }
        panel.style.display = 'block';
    }

    function closeDayDetail() {
        document.getElementById('dayDetailPanel').style.display = 'none';
    }

    /* ── 요일 반복 ── */
    let currentDateMode = 'single';
    let selectedDows = new Set();

    function setDateMode(mode) {
        currentDateMode = mode;
        document.getElementById('modeSingle').style.display = mode === 'single' ? 'block' : 'none';
        document.getElementById('modeRepeat').style.display = mode === 'repeat' ? 'block' : 'none';
        document.getElementById('tabSingle').classList.toggle('active', mode === 'single');
        document.getElementById('tabRepeat').classList.toggle('active', mode === 'repeat');
        if (mode === 'repeat') {
            const today = todayIso();
            if (!document.getElementById('rFrom').value) document.getElementById('rFrom').value = today;
            if (!document.getElementById('rTo').value) {
                const d = new Date();
                d.setDate(d.getDate() + 27);
                document.getElementById('rTo').value = localDateIso(d);
            }
            updateRepeatPreview();
        }
        selectedTimes.clear();
        renderTimeGrid();
    }

    function toggleDow(dow) {
        if (selectedDows.has(dow)) selectedDows.delete(dow);
        else selectedDows.add(dow);
        document.querySelectorAll('.wd-btn').forEach(btn => {
            btn.classList.toggle('selected', selectedDows.has(Number(btn.dataset.dow)));
        });
        updateRepeatPreview();
    }

    function getRepeatDates() {
        const from = document.getElementById('rFrom').value;
        const to   = document.getElementById('rTo').value;
        if (!from || !to || selectedDows.size === 0) return [];
        const result = [];
        let cur = new Date(from + 'T00:00:00');
        const end = new Date(to + 'T00:00:00');
        while (cur <= end) {
            if (selectedDows.has(cur.getDay())) result.push(localDateIso(cur));
            cur.setDate(cur.getDate() + 1);
        }
        return result;
    }

    function updateRepeatPreview() {
        const dates = getRepeatDates();
        const box = document.getElementById('repeatPreview');
        if (dates.length === 0) {
            box.innerHTML = '<span class="preview-empty">날짜 범위와 요일을 선택하면 대상 날짜가 표시됩니다.</span>';
            return;
        }
        const DOW_KO = ['일','월','화','수','목','금','토'];
        const chips = dates.map(ds => {
            const [y, m, d] = ds.split('-').map(Number);
            const dow = new Date(y, m-1, d).getDay();
            return '<span class="repeat-date-chip">' + m + '/' + d + '(' + DOW_KO[dow] + ')</span>';
        }).join('');
        box.innerHTML = '총 <strong>' + dates.length + '일</strong>: ' + chips;
    }

    function toggleSection(name) {
        const body = document.getElementById(name + 'Body');
        const header = body.previousElementSibling;
        const isOpen = body.classList.toggle('open');
        header.classList.toggle('open', isOpen);
    }

    /* ── 처리할 예약 요청 ── */
    let pendingList = [];

    async function loadPending() {
        if (!currentSpaceId) return;
        const box = document.getElementById('pendingList');
        const title = document.getElementById('pendingTitle');
        const allBtn = document.getElementById('confirmAllBtn');
        try {
            const list = await api('GET', '/api/spaces/' + currentSpaceId + '/reservations');
            pendingList = list;
            if (list.length === 0) {
                title.innerHTML = '처리할 예약 요청';
                box.innerHTML = '<div class="empty">처리할 예약 요청이 없어요.</div>';
                allBtn.style.display = 'none';
                return;
            }
            title.innerHTML = '처리할 예약 요청 <span class="count-badge">' + list.length + '</span>';
            box.innerHTML = list.map(renderPending).join('');
            allBtn.style.display = list.length >= 2 ? 'block' : 'none';
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    async function confirmAllReservations() {
        if (!confirm('대기 중인 예약 ' + pendingList.length + '건을 모두 수락할까요?')) return;
        let ok = 0, fail = 0;
        for (const r of pendingList) {
            try {
                await api('PATCH', '/api/spaces/' + currentSpaceId + '/reservations/' + r.id + '/confirm');
                ok++;
            } catch (e) { fail++; }
        }
        if (ok > 0) showMessage('msg', ok + '건을 수락했어요.' + (fail > 0 ? ' (' + fail + '건 실패)' : ''), 'ok');
        else showMessage('msg', '수락에 실패했어요.', 'error');
        loadPending();
        loadDiary();
    }

    function renderPending(r) {
        const name = r.memberName || '회원#' + r.memberId;
        return '<div class="item">'
            + '<div class="time">' + formatDate(r.slotDate) + '<span class="date-label">'
            + formatTime(r.startTime) + ' ~ ' + formatTime(r.endTime) + '</span></div>'
            + '<div class="meta">'
            + '<span>' + name + '</span>'
            + (r.memo ? '<span>메모: ' + r.memo + '</span>' : '')
            + '</div>'
            + '<div class="btn-row">'
            + '<button class="btn btn-green" onclick="confirmReservation(' + r.id + ')">수락</button>'
            + '<button class="btn btn-gray" onclick="rejectReservation(' + r.id + ')">거절</button>'
            + '</div></div>';
    }

    async function confirmReservation(id) {
        if (!confirm('이 예약을 수락할까요?')) return;
        try {
            await api('PATCH', '/api/spaces/' + currentSpaceId + '/reservations/' + id + '/confirm');
            showMessage('msg', '예약을 수락했어요.', 'ok');
            loadPending(); loadDiary();
        } catch (e) { showMessage('msg', e.message, 'error'); }
    }

    async function rejectReservation(id) {
        const reason = prompt('거절 사유를 입력하세요 (선택, 비워도 됩니다)');
        if (reason === null) return;
        try {
            await api('PATCH', '/api/spaces/' + currentSpaceId + '/reservations/' + id + '/reject',
                { reason: reason });
            showMessage('msg', '예약을 거절했어요.', 'ok');
            loadPending(); loadDiary();
        } catch (e) { showMessage('msg', e.message, 'error'); }
    }

    /* ── 시간대 만들기 ── */
    let selectedTimes = new Set();
    let existingSlots = [];

    async function onAdminDateChange() {
        if (!currentSpaceId) return;
        const date = document.getElementById('cDate').value;
        const today = todayIso();
        const warn = document.getElementById('adminDateWarning');
        if (date < today) {
            warn.textContent = '지난 날짜입니다. 참여자가 예약할 수 없지만 강제로 시간대를 만들 수 있어요.';
            warn.className = 'date-warning danger';
            warn.style.display = 'block';
        } else if (date === today) {
            warn.textContent = '오늘 날짜는 예약 마감 기간이에요. 만들어도 참여자가 신청할 수 없는 상태로 생성됩니다.';
            warn.className = 'date-warning';
            warn.style.display = 'block';
        } else {
            warn.style.display = 'none';
        }
        selectedTimes.clear();
        try {
            existingSlots = await api('GET',
                '/api/spaces/' + currentSpaceId + '/slots?date=' + date + '&ownerView=true');
        } catch (_) { existingSlots = []; }
        renderTimeGrid();
    }

    function renderTimeGrid() {
        const slotMinutes = Number(document.getElementById('cMinutes').value) || 120;
        const allTimes = [];
        for (let h = 7; h <= 21; h++) {
            for (let m = 0; m < 60; m += 30) {
                const startMin = h * 60 + m;
                if (startMin + slotMinutes > 23 * 60) continue;
                allTimes.push({ h, m, startMin });
            }
        }

        function renderGroup(times) {
            return times.map(({ h, m, startMin }) => {
                const startStr = pad(h) + ':' + pad(m);
                const endMin = startMin + slotMinutes;
                const endStr = pad(Math.floor(endMin / 60)) + ':' + pad(endMin % 60);

                const overlaps = existingSlots.some(s => {
                    if (!s.startTime || !s.endTime) return false;
                    const [esh, esm] = s.startTime.split(':').map(Number);
                    const [eeh, eem] = s.endTime.split(':').map(Number);
                    return startMin < (eeh * 60 + eem) && endMin > (esh * 60 + esm);
                });
                if (overlaps) {
                    return '<button class="time-btn time-btn-exists" disabled>'
                        + startStr + '<span class="time-end">이미 존재</span></button>';
                }
                const isSel = selectedTimes.has(startStr);
                return '<button class="time-btn ' + (isSel ? 'selected' : '') + '" onclick="toggleTime(\'' + startStr + '\')">'
                    + startStr + '<span class="time-end">~ ' + endStr + '</span></button>';
            }).join('');
        }

        document.getElementById('timeGridAm').innerHTML = renderGroup(allTimes.filter(t => t.h < 12));
        document.getElementById('timeGridPm').innerHTML = renderGroup(allTimes.filter(t => t.h >= 12));
        updateGridStatus();
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function toggleTime(startStr) {
        if (selectedTimes.has(startStr)) selectedTimes.delete(startStr);
        else selectedTimes.add(startStr);
        renderTimeGrid();
    }

    function updateGridStatus() {
        const cnt = selectedTimes.size;
        const countEl = document.getElementById('selectedCount');
        const btnEl   = document.getElementById('createBtn');
        const wrapEl  = document.getElementById('autoActivateWrap');
        const hintEl  = document.getElementById('activateHint');
        if (cnt > 0) {
            countEl.textContent = cnt + '개 시간대 선택됨';
            countEl.style.display = 'block';
            btnEl.textContent = '선택한 시간대 ' + cnt + '개 만들기';
            btnEl.style.display = 'block';
            wrapEl.style.display = 'block';
            hintEl.style.display = 'none';
        } else {
            countEl.style.display = 'none';
            btnEl.style.display = 'none';
            wrapEl.style.display = 'none';
            hintEl.style.display = 'block';
        }
    }

    async function createSlotsFromGrid() {
        if (!currentSpaceId) return;
        const slotMinutes = Number(document.getElementById('cMinutes').value);
        const capacity = Number(document.getElementById('cCapacity').value) || 4;
        const autoActivate = document.getElementById('autoActivate').checked;

        if (selectedTimes.size === 0) {
            showMessage('msg', '시간대를 하나 이상 선택해 주세요.', 'error'); return;
        }

        let targetDates = [];
        if (currentDateMode === 'single') {
            const date = document.getElementById('cDate').value;
            if (!date) { showMessage('msg', '날짜를 선택해 주세요.', 'error'); return; }
            targetDates = [date];
        } else {
            targetDates = getRepeatDates();
            if (targetDates.length === 0) {
                showMessage('msg', '날짜 범위와 반복 요일을 선택해 주세요.', 'error'); return;
            }
        }

        let created = 0;
        const failed = [];

        for (const date of targetDates) {
            for (const startStr of [...selectedTimes].sort()) {
                const [sh, sm] = startStr.split(':').map(Number);
                const endMin = sh * 60 + sm + slotMinutes;
                const endStr = pad(Math.floor(endMin / 60)) + ':' + pad(endMin % 60);
                try {
                    const res = await api('POST',
                        '/api/spaces/' + currentSpaceId + '/slots/single',
                        { date, startTime: startStr + ':00', endTime: endStr + ':00', capacity });
                    if (autoActivate && res && res.id) {
                        try { await api('PATCH', '/api/spaces/' + currentSpaceId + '/slots/' + res.id + '/activate'); } catch(_) {}
                    }
                    created++;
                } catch (e) {
                    failed.push(date + ' ' + startStr + ' (' + e.message + ')');
                }
            }
        }

        if (created > 0) {
            const msg = currentDateMode === 'single'
                ? created + '개의 시간대를 만들었어요.'
                : targetDates.length + '일 x ' + selectedTimes.size + '타임 = ' + created + '개 시간대를 만들었어요.';
            showMessage('msg', msg + (autoActivate ? ' (즉시 공개됨)' : ' 시간대 관리에서 공개해 주세요.'), 'ok');
            selectedTimes.clear();
            renderTimeGrid();
            const lastDate = targetDates[targetDates.length - 1];
            document.getElementById('mDate').value = lastDate;
            if (!document.getElementById('manageSlotBody').classList.contains('open')) toggleSection('manageSlot');
            loadAdminSlots();
            loadDiary();
        }
        if (failed.length > 0) {
            showMessage('msg', '일부 실패 (' + failed.length + '건): '
                + failed.slice(0,3).join(', ') + (failed.length > 3 ? ' ...' : ''), 'error');
        }
    }

    /* ── 시간대 관리 ── */
    async function loadAdminSlots() {
        if (!currentSpaceId) return;
        const date = document.getElementById('mDate').value;
        if (!date) return;
        const box = document.getElementById('adminSlotList');
        try {
            const [slots, reservations] = await Promise.all([
                api('GET', '/api/spaces/' + currentSpaceId + '/slots?date=' + date + '&ownerView=true'),
                api('GET', '/api/spaces/' + currentSpaceId + '/reservations/by-date?date=' + date)
            ]);
            if (slots.length === 0) {
                box.innerHTML = '<div class="empty">이 날짜에 만든 시간대가 없어요.</div>'; return;
            }
            const resMap = {};
            reservations.forEach(r => {
                if (!resMap[r.slotId]) resMap[r.slotId] = [];
                resMap[r.slotId].push(r);
            });
            box.innerHTML = slots.map(slot => renderAdminSlot(slot, resMap[slot.id] || [])).join('');
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    function renderAdminSlot(slot, reservations) {
        const toggleBtn = slot.active
            ? '<button class="btn btn-gray btn-small" onclick="deactivateSlot(' + slot.id + ')">숨기기</button>'
            : '<button class="btn btn-green btn-small" onclick="activateSlot(' + slot.id + ')">공개하기</button>';
        const visibleText  = slot.active ? '공개됨' : '비공개';
        const visibleClass = slot.active ? 'st-confirmed' : 'st-closed';

        let memberListHtml = '';
        if (reservations.length > 0) {
            const rows = reservations.map(r => {
                const sc = r.status === 'CONFIRMED' ? 'st-confirmed' : 'st-requested';
                const sl = r.status === 'CONFIRMED' ? '확정' : '대기중';
                return '<div class="manage-member-row">'
                    + '<span class="manage-member-name">' + (r.memberName || '회원#' + r.memberId) + '</span>'
                    + '<span class="badge-status ' + sc + '">' + sl + '</span>'
                    + '</div>';
            }).join('');
            memberListHtml = '<div class="manage-member-list">' + rows + '</div>';
        }

        return '<div class="item">'
            + '<div class="manage-slot-top">'
            +   '<div>'
            +     '<div class="time">' + formatTime(slot.startTime) + ' ~ ' + formatTime(slot.endTime) + '</div>'
            +     '<div class="meta">'
            +       '<span class="badge-status ' + visibleClass + '">' + visibleText + '</span>'
            +       '<span>확정 ' + slot.confirmedCount + ' / ' + slot.capacity + '명</span>'
            +       '<span class="badge-status ' + slotStatusClass(slot.status) + '">' + slotStatusLabel(slot.status) + '</span>'
            +     '</div>'
            +   '</div>'
            +   (reservations.length > 0 ? memberListHtml : '<div class="manage-no-reservation">예약자 없음</div>')
            + '</div>'
            + '<div class="btn-row" style="margin-top:10px;">'
            + toggleBtn
            + '<button class="btn btn-danger btn-small" onclick="deleteSlot(' + slot.id + ')">삭제</button>'
            + '</div></div>';
    }

    async function activateSlot(id) {
        try {
            await api('PATCH', '/api/spaces/' + currentSpaceId + '/slots/' + id + '/activate');
            loadAdminSlots(); loadDiary();
        } catch (e) { showMessage('msg', e.message, 'error'); }
    }

    async function deactivateSlot(id) {
        try {
            await api('PATCH', '/api/spaces/' + currentSpaceId + '/slots/' + id + '/deactivate');
            loadAdminSlots(); loadDiary();
        } catch (e) { showMessage('msg', e.message, 'error'); }
    }

    async function deleteSlot(id) {
        if (!confirm('이 시간대를 삭제할까요?')) return;
        try {
            await api('DELETE', '/api/spaces/' + currentSpaceId + '/slots/' + id);
            showMessage('msg', '시간대를 삭제했어요.', 'ok');
            loadAdminSlots(); loadDiary();
        } catch (e) { showMessage('msg', e.message, 'error'); }
    }

    /* ── 회원 현황판 ── */
    async function loadMemberBoard() {
        if (!currentSpaceId) return;
        const box = document.getElementById('memberBoardList');
        try {
            const members = await api('GET', '/api/spaces/' + currentSpaceId + '/members');
            if (members.length === 0) {
                box.innerHTML = '<div class="empty">아직 예약 신청을 한 참여자가 없어요.</div>';
                return;
            }
            box.innerHTML = members.map(m => {
                const pct = m.monthlyLimit > 0
                    ? Math.min(100, Math.round(m.usedThisMonth / m.monthlyLimit * 100)) : 0;
                const over = m.usedThisMonth >= m.monthlyLimit;
                return '<div class="member-stat-row">'
                    + '<span class="ms-name">' + escHtml(m.memberName) + '</span>'
                    + '<div class="usage-bar-wrap"><div class="usage-bar' + (over ? ' full' : '') + '" style="width:' + pct + '%"></div></div>'
                    + '<span class="ms-usage' + (over ? ' over' : '') + '">' + m.usedThisMonth + ' / ' + m.monthlyLimit + '회</span>'
                    + '<input class="ms-limit-input" type="number" min="0" value="' + m.monthlyLimit + '" id="limit-' + m.memberId + '">'
                    + '<button class="btn btn-small btn-sub" onclick="updateMemberLimit(' + m.memberId + ')">저장</button>'
                    + '</div>';
            }).join('');
        } catch (e) {
            box.innerHTML = '<div class="empty">' + e.message + '</div>';
        }
    }

    async function updateMemberLimit(memberId) {
        const input = document.getElementById('limit-' + memberId);
        const val = parseInt(input.value, 10);
        if (isNaN(val) || val < 0) { showMessage('msg', '올바른 숫자를 입력해 주세요.', 'error'); return; }
        try {
            await api('PATCH', '/api/spaces/' + currentSpaceId + '/members/' + memberId + '/limit',
                { monthlyLimit: val });
            showMessage('msg', '한도를 수정했어요.', 'ok');
            loadMemberBoard();
        } catch (e) {
            showMessage('msg', e.message, 'error');
        }
    }

    /* ── 알림 ── */
    function toggleNotify() {
        document.getElementById('notifyPanel').classList.toggle('show');
    }

    async function loadNotifications() {
        try {
            const list = await api('GET', '/api/notifications/me');
            const countData = await api('GET', '/api/notifications/me/unread-count');
            const badge = document.getElementById('bellBadge');
            if (countData.unreadCount > 0) {
                badge.textContent = countData.unreadCount;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
            const box = document.getElementById('notifyList');
            if (list.length === 0) {
                box.innerHTML = '<div class="empty">알림이 없어요.</div>'; return;
            }
            box.innerHTML = list.map(function (n) {
                return '<div class="notify-item ' + (n.read ? '' : 'unread') + '" '
                    + (n.read ? '' : 'onclick="readNotification(' + n.id + ')"') + '>'
                    + n.message
                    + '<div class="when">' + formatDateTime(n.createdAt) + '</div>'
                    + '</div>';
            }).join('');
        } catch (e) { /* 무시 */ }
    }

    async function readNotification(id) {
        try {
            await api('PATCH', '/api/notifications/' + id + '/read');
            loadNotifications();
        } catch (e) { /* 무시 */ }
    }
</script>
